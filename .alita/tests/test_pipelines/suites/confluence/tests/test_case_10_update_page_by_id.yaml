name: "CF10 - Update Page by ID"
description: "Verify update_page_by_id tool updates page content and labels, then read and delete"

toolkits:
  - id: ${CONFLUENCE_TOOLKIT_ID}
    name: ${CONFLUENCE_TOOLKIT_NAME}

state:
  create_result:
    type: str
  delete_result:
    type: str
  initial_body:
    type: str
  is_page_read:
    type: str
    value: ''
  label:
    type: list
    value:
      - automation
      - updated
  page_id:
    type: str
  page_title:
    type: str
  read_result:
    type: str
  representation:
    type: str
    value: storage
  space:
    type: str
    value: AT
  status:
    type: str
    value: current
  test_data:
    type: dict
  test_results:
    type: dict
  timestamp:
    type: str
    value: ${TIMESTAMP}
  update_result:
    type: str
  updated_body:
    type: str
entry_point: generate_test_data
interrupt_after: []
nodes:
  - id: generate_test_data
    type: llm
    input:
      - timestamp
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: You are a test data generator. Be concise. Do NOT add explanations.
      task:
        type: fstring
        value: |
          Generate test data for Confluence page update test. Timestamp: {timestamp}

          Return ONLY this JSON (no markdown, no extra text):
          {{"page_title": "TC_10_Update_{timestamp}_auto", "initial_body": "<p>Initial test content {timestamp}.</p>", "updated_body": "<p>Updated test content {timestamp} v2.</p>"}}
    model: gpt-4o
    output:
      - test_data
      - page_title
      - initial_body
      - updated_body
    structured_output: true
    structured_output_dict:
      test_data: dict
    transition: create_page
  - id: create_page
    type: toolkit
    input:
      - space
      - page_title
      - initial_body
      - status
      - representation
    input_mapping:
      body:
        type: variable
        value: initial_body
      representation:
        type: variable
        value: representation
      space:
        type: variable
        value: space
      status:
        type: variable
        value: status
      title:
        type: variable
        value: page_title
    output:
      - create_result
    structured_output: true
    tool: create_page
    toolkit_name: ${CONFLUENCE_TOOLKIT_NAME}
    transition: extract_page_id
  - id: extract_page_id
    type: llm
    input:
      - create_result
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: You are a data extractor. Return only the requested JSON. No markdown, no explanation.
      task:
        type: fstring
        value: |
          Extract the numeric page ID from the following Confluence create_page tool output.

          Tool Output: {create_result}

          The output contains a Details dict with an 'id' field (a numeric string like '261062657').
          Return ONLY this JSON (no markdown, no extra text):
          {{"page_id": "<numeric_id_string>"}}
    model: gpt-4o
    output:
      - page_id
    structured_output: true
    structured_output_dict:
      page_id: str
    transition: update_page
  - id: update_page
    type: toolkit
    input:
      - page_id
      - updated_body
      - label
      - representation
    input_mapping:
      new_body:
        type: variable
        value: updated_body
      new_labels:
        type: variable
        value: label
      page_id:
        type: variable
        value: page_id
      representation:
        type: variable
        value: representation
    output:
      - update_result
    structured_output: true
    tool: update_page_by_id
    toolkit_name: ${CONFLUENCE_TOOLKIT_NAME}
    transition: read_updated_page
  - id: read_updated_page
    type: toolkit
    input:
      - page_id
    input_mapping:
      page_id:
        type: variable
        value: page_id
    output:
      - read_result
    structured_output: true
    tool: read_page_by_id
    toolkit_name: ${CONFLUENCE_TOOLKIT_NAME}
    transition: validate_update
  - id: validate_update
    type: llm
    input:
      - update_result
      - read_result
      - page_id
      - updated_body
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: You are a quality assurance validator. Return only the requested JSON. No markdown, no explanation.
      task:
        type: fstring
        value: |
          Analyze the update and read results for a Confluence page update test. Keep response under 200 tokens.

          Update Result: {update_result}
          Read Result: {read_result}
          Page ID: {page_id}
          Expected Updated Body: {updated_body}

          Checks:
          1. update_successful: update result contains "updated successfully" or "success"
          2. page_id_in_result: page_id value appears in update result
          3. content_updated: read result contains words from the expected updated body
          4. has_labels: update result mentions "label", "automation", or "updated"

          Return ONLY this JSON (no markdown, no extra text):
          {{"validation_results": {{"update_successful": boolean, "page_id_in_result": boolean, "content_updated": boolean, "has_labels": boolean}}}}
    model: gpt-4o
    output:
      - test_results
    structured_output: true
    structured_output_dict:
      test_results: dict
    transition: delete_page
  - id: process_results
    type: llm
    input:
      - delete_result
      - test_results
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: You are a quality assurance validator. Be concise. Do NOT echo full inputs.
      task:
        type: fstring
        value: |
          Analyze the complete workflow results. Keep response under 300 tokens.

          Delete Result: {delete_result}
          Validation Results: {test_results}

          Checks:
          1. Page deleted successfully (delete result contains success/deleted message).
          2. Update was successful (validation_results.update_successful is true).
          3. Content was verified (validation_results.content_updated is true).

          Return ONLY this JSON (no markdown, no extra text):
          {{"test_passed": boolean, "tool_executed": true, "page_created": true, "page_updated": boolean, "content_verified": boolean, "page_deleted": boolean, "failed_checks": []}}
    model: gpt-4o
    output:
      - test_results
    structured_output_dict:
      test_results: dict
    transition: END
  - id: delete_page
    type: toolkit
    input:
      - page_id
    input_mapping:
      page_id:
        type: variable
        value: page_id
      page_title:
        type: fixed
        value: null
    output:
      - delete_result
    structured_output: false
    tool: delete_page
    toolkit_name: ${CONFLUENCE_TOOLKIT_NAME}
    transition: process_results
