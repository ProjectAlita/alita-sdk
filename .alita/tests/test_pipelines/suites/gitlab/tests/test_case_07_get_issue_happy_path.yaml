name: "GL07 - Get Issue"
priority: Critical
description: |
  Verify get_issue tool retrieves issue details by number.
  
  Objective: Confirm issue retrieval functionality
  
  Expected Behavior:
  - Tool executes successfully without errors
  - Returns issue details including title and description
  - Issue number matches requested issue

toolkits:
  - id: ${GITLAB_TOOLKIT_ID}
    name: ${GITLAB_TOOLKIT_NAME}

state:
  issue_number:
    type: int
    value: ${GITLAB_TEST_ISSUE_NUMBER}
  tool_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_issue

nodes:
  - id: invoke_get_issue
    type: toolkit
    tool: get_issue
    toolkit_name: ${GITLAB_TOOLKIT_NAME}
    input:
      - issue_number
    input_mapping:
      issue_number:
        type: variable
        value: issue_number
    output:
      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - issue_number
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'get_issue' tool.

          tool executed: get_issue
          parameters: issue_number={issue_number}
          results: {tool_result}

          This is a POSITIVE test - we expect successful issue retrieval.

          Validation Criteria (ALL must pass for test_passed=true):
          1. tool_executed: get_issue tool ran and returned a result
          2. no_errors: Output does NOT contain error indicators (e.g. "error", "not found", "exception")
          3. title_present: Output contains a non-empty "title" field
          4. body_present: Output contains a "body" field (may be empty string)

          NOTE: The "comments" field may be returned as a string representation of a list - this is acceptable and should NOT cause test failure.
          NOTE: The response does not need to include an explicit issue_number field - the tool was called with the correct issue_number parameter.

          return a json object with:
          {{
            "test_passed": true/false (true only if ALL 4 criteria pass),
            "tool_executed": true/false,
            "no_errors": true/false,
            "title_present": true/false,
            "body_present": true/false,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          return **only** the json object. no markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
