name: "GL07 - Get Issue"
priority: Critical
description: |
  Verify get_issue tool retrieves issue details by number.
  
  Objective: Confirm issue retrieval functionality
  
  Expected Behavior:
  - Tool executes successfully without errors
  - Returns issue details including title and description
  - Issue number matches requested issue

toolkits:
  - id: ${GITLAB_TOOLKIT_ID}
    name: ${GITLAB_TOOLKIT_NAME}

state:
  issue_number:
    type: int
    value: ${GITLAB_TEST_ISSUE_NUMBER}
  tool_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_issue

nodes:
  - id: invoke_get_issue
    type: toolkit
    tool: get_issue
    toolkit_name: ${GITLAB_TOOLKIT_NAME}
    input:
      - issue_number
    input_mapping:
      issue_number:
        type: variable
        value: issue_number
    output:
      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - issue_number
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'get_issue' tool.

          tool executed: get_issue
          parameters: issue_number={issue_number}
          results: {tool_result}

          expected behavior:
          - tool executes successfully without errors
          - returns issue details including title and body/description fields
          - comments field is present (may be a list or a string representation of a list)

          evaluate:
          1. did the tool execute successfully?
          2. are there any errors?
          3. does the output contain a non-empty title field?
          4. does the output contain a body field (may be null/empty for issues without description)?
          5. does the output contain a comments field (list or string)?

          note: the tool does not return issue_number in its response - do not check for it.
          note: comments may be serialized as a string representation of a list - this is acceptable.

          return a json object with:
          {{
            "test_passed": true/false,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          return **only** the json object. no markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
