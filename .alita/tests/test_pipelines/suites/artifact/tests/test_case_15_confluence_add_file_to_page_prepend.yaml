name: "ART15 - Add File to Page (Prepend File)"
priority: High
description: |
  Verify `add_file_to_page` tool can prepend file reference to page content.

  Objective: Ensure tool handles position parameter correctly and adds file at beginning of page.

  Expected Behavior:
  - Creates a test page dynamically
  - Tool executes successfully without errors.
  - File is uploaded and reference is prepended to page content.
  - Returns success message indicating successful upload and position.
  - Cleans up the test page after completion.

toolkits:
  - id: ${CONFLUENCE_TOOLKIT_ID}
    name: ${CONFLUENCE_TOOLKIT_NAME}

state:
  # Page creation
  space:
    type: str
    value: 'AT'
  page_title:
    type: str
    value: 'ART15_Test_Page_${TIMESTAMP}'
  page_body:
    type: str
    value: '<p>Test page for artifact file upload (prepend mode).</p>'
  status:
    type: str
    value: 'current'
  representation:
    type: str
    value: 'storage'
  create_result:
    type: str
  page_id:
    type: str
  # File upload
  filepath:
    type: str
    value: '${TEST_ARTIFACT_ID}'
  filename:
    type: str
    value: 'test_upload.txt'
  position:
    type: str
    value: 'prepend'
  tool_result:
    type: str
  # Cleanup
  delete_result:
    type: str
  test_results:
    type: dict

entry_point: create_page

nodes:
  - id: create_page
    type: toolkit
    tool: create_page
    toolkit_name: ${CONFLUENCE_TOOLKIT_NAME}
    input:
      - space
      - page_title
      - page_body
      - status
      - representation
    input_mapping:
      space:
        type: variable
        value: space
      title:
        type: variable
        value: page_title
      body:
        type: variable
        value: page_body
      status:
        type: variable
        value: status
      representation:
        type: variable
        value: representation
    output:
      - create_result
    structured_output: true
    transition: extract_page_id

  - id: extract_page_id
    type: llm
    model: gpt-4o
    input:
      - create_result
    input_mapping:
      system:
        type: fixed
        value: "You are a data extraction assistant."
      task:
        type: fstring
        value: |
          Extract the page ID from the create_page result.

          Create Result: {create_result}

          Find the 'id' field in the page details and return ONLY the page ID as a string.

          Return **EXACTLY** only the page ID as a plain string (no JSON, no quotes, no explanations).
      chat_history:
        type: fixed
        value: []
    output:
      - page_id
    structured_output: false
    transition: invoke_add_file_to_page

  - id: invoke_add_file_to_page
    type: toolkit
    tool: add_file_to_page
    toolkit_name: ${CONFLUENCE_TOOLKIT_NAME}
    input:
      - page_id
      - filepath
      - filename
      - position
    input_mapping:
      page_id:
        type: variable
        value: page_id
      filepath:
        type: variable
        value: filepath
      filename:
        type: variable
        value: filename
      position:
        type: variable
        value: position
    output:
      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o
    input:
      - tool_result
      - position
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'add_file_to_page' tool.

          Tool Result: {tool_result}
          Position: {position}

          Perform the following checks:
          1. Confirm the tool executed successfully (result is not empty, null, or error message).
          2. Verify the output contains success message indicating file was uploaded.
          3. Check that position parameter was handled correctly (file prepended to content).

          Return a JSON object named test_results with the following structure:

          {{
            "test_passed": boolean,
            "summary": "Brief description of outcome",
            "error": "Error details if failed, null if passed"
          }}

          Return **ONLY** the JSON object. No markdown, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: delete_page

  - id: delete_page
    type: toolkit
    tool: delete_page
    toolkit_name: ${CONFLUENCE_TOOLKIT_NAME}
    input:
      - page_title
      - test_results
    input_mapping:
      page_title:
        type: variable
        value: page_title
    output:
      - delete_result
      - test_results
    structured_output: true
    transition: END
