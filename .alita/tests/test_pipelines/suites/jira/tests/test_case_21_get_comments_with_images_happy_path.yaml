name: "JR21 - Get Comments with Image Descriptions (Happy Path)"
priority: Critical
description: |
  Verify `get_comments_with_image_descriptions` tool retrieves comments with image processing.

  Objective: Ensure tool can get comments and process images in them.

  Expected Behavior:
  - Tool executes successfully without errors.
  - Returns comments with image descriptions.

toolkits:
  - id: ${JIRA_TOOLKIT_ID}
    name: ${JIRA_TOOLKIT_NAME}

state:
  issue_key:
    type: str
    value: ${JIRA_TEST_ISSUE_2}
  tool_result:
    type: str
  test_results:
    type: dict

entry_point: invoke_get_comments_with_images

nodes:
  - id: invoke_get_comments_with_images
    type: toolkit
    tool: get_comments_with_image_descriptions
    toolkit_name: ${JIRA_TOOLKIT_NAME}
    input:
      - issue_key
    input_mapping:
      jira_issue_key:
        type: variable
        value: issue_key
      process_images:
        type: fixed
        value: false
    output:
      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: ${DEFAULT_LLM_MODEL}
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'get_comments_with_image_descriptions' tool called with process_images=false.

          Tool Result: {tool_result}

          Perform the following checks:
          1. Confirm the tool executed successfully (result is not empty or null).
          2. Result should contain comments with text content.
          3. Since process_images=false was used, image processing was intentionally skipped.
             Raw image references (e.g. "!filename.jpg|alt=..." or "!filename.png!") in the output are CORRECT and EXPECTED behavior.
             Do NOT fail the test because images were not described - that is by design when process_images=false.
          4. Only fail if:
             - The result is empty or null (tool did not return any data)
             - The result contains system failure indicators:
               * "llm not available" - configuration issue
               * stack traces or unexpected python exceptions
          5. If comments exist (with or without images), the tool succeeded.

          Return a JSON object named test_results with the following structure:

          {{
            "test_passed": boolean (true if tool returned comments successfully, regardless of image processing),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          Return **ONLY** the JSON object. No markdown, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
