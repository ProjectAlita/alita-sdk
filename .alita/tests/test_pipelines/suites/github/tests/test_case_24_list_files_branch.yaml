name: "GH24 - List Files in Branch"
description: "Test list_files_in_main_branch retrieves file list from main branch"
priority: High

toolkits:
  - id: ${GITHUB_TOOLKIT_ID}
    name: ${GITHUB_TOOLKIT_NAME}

state:
  known_file:
    type: str
    value: ".gitignore"
  tool_result:
    type: str
  trimmed_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_list_files

nodes:
  - id: invoke_list_files
    type: toolkit
    tool: list_files_in_main_branch
    toolkit_name: ${GITHUB_TOOLKIT_NAME}
    input: []
    input_mapping: {}
    output:
      - tool_result
    structured_output: true
    transition: trim_result

  - id: trim_result
    type: code
    code:
      type: fixed
      value: |
        import json

        raw = alita_state.get('tool_result', '')
        known_file = alita_state.get('known_file', '.gitignore')

        try:
            files = json.loads(raw) if isinstance(raw, str) else raw
        except Exception:
            files = []

        files_count = len(files)
        has_known_file = known_file in files
        sample_files = files[:10] if files else []

        {"trimmed_result": {"files_count": files_count, "has_known_file": has_known_file, "sample_files": sample_files, "known_file": known_file}}
    input:
      - tool_result
      - known_file
    output:
      - trimmed_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - trimmed_result
    input_mapping:
      system:
        type: fixed
        value: "you are a quality assurance validator."
      task:
        type: fstring
        value: |
          analyze the list_files_in_main_branch operation results.

          trimmed result: {trimmed_result}

          perform the following checks:

          1. verify files_count > 0 (tool returned files)
          2. confirm has_known_file is true
          3. verify sample_files is a non-empty list

          return a json object with:
          {{
            "test_passed": true/false,
            "files_count": integer,
            "has_known_file": true/false,
            "summary": "brief outcome description",
            "error": null or "error description"
          }}

          return **only** the json object. no markdown formatting, no additional text. keep response under 200 tokens.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
