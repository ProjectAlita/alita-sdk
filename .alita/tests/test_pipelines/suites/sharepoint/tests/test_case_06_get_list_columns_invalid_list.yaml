name: "SP06 - get_list_columns: Invalid list"
priority: High
description: |
  Verify the SharePoint 'get_list_columns' tool handles invalid list names gracefully.
  
  Objective: Test error handling for non-existent list
  
  Expected Behavior:
  - Tool executes and returns error information
  - Error message indicates list not found
  - No system crashes or unhandled exceptions
  - Error is clear and actionable

toolkits:
  - id: ${SHAREPOINT_TOOLKIT_ID}
    name: ${SHAREPOINT_TOOLKIT_NAME}

state:
  list_title:
    type: str
    value: "InvalidList_99999_DoesNotExist"
  columns_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_list_columns

nodes:
  - id: invoke_get_list_columns
    type: toolkit
    tool: get_list_columns
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - list_title
    input_mapping:
      list_title:
        type: variable
        value: list_title
    output:
      - columns_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - columns_result
      - list_title
    input_mapping:
      system:
        type: fixed
        value: "you are a quality assurance validator."
      task:
        type: fstring
        value: |
          analyze the output from the 'get_list_columns' tool for error handling.

          tool executed: get_list_columns
          list title: {list_title}
          results: {columns_result}

          this test validates error handling for invalid list names.

          important: the tool output may contain a full stack trace with intermediate http errors
          (such as 401 unauthorized). these intermediate errors are internal implementation details
          of the sharepoint sdk — the sdk catches them and converts them into a final toolexception
          with a "list not found" message. focus only on the final error message returned by the tool,
          not on intermediate errors in the stack trace.

          perform the following checks:
          1. confirm the tool executed (result is not empty or null).
          2. examine the final error message (the toolexception message at the end of the output).
             valid error patterns for invalid lists include:
             - list not found or does not exist
             - invalid list title or list name
             - cannot access list or list unavailable
             - list retrieval failed or list error
             - error getting list columns: list '...' not found on site
          3. determine if the final error message is about the invalid list itself.
             if the final toolexception message says "list not found" or similar, the test passes —
             regardless of any intermediate http errors (401, 403, etc.) in the stack trace.
             only fail if the tool returned no error at all, or returned columns instead of an error.

          return a json object with:
          {{
            "test_passed": true/false (true if final error message indicates list not found as expected),
            "summary": "brief description of outcome",
            "error": "error details if test failed, null if passed"
          }}

          return **only** the json object. no markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
