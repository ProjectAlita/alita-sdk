name: "SP06 - get_list_columns: Invalid list"
priority: High
description: |
  Verify the SharePoint 'get_list_columns' tool handles invalid list names gracefully.
  
  Objective: Test error handling for non-existent list
  
  Expected Behavior:
  - Tool executes and returns error information
  - Error message indicates list not found
  - No system crashes or unhandled exceptions
  - Error is clear and actionable

toolkits:
  - id: ${SHAREPOINT_TOOLKIT_ID}
    name: ${SHAREPOINT_TOOLKIT_NAME}

state:
  list_title:
    type: str
    value: "InvalidList_99999_DoesNotExist"
  columns_result:
    type: dict
  test_results:
    type: dict

entry_point: invoke_get_list_columns

nodes:
  - id: invoke_get_list_columns
    type: toolkit
    tool: get_list_columns
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - list_title
    input_mapping:
      list_title:
        type: variable
        value: list_title
    output:
      - columns_result
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - columns_result
      - list_title
    input_mapping:
      system:
        type: fixed
        value: "you are a quality assurance validator."
      task:
        type: fstring
        value: |
          analyze the output from the 'get_list_columns' tool for error handling.

          tool executed: get_list_columns
          list title: {list_title}
          results: {columns_result}

          this test validates error handling for invalid list names.

          IMPORTANT: this is a NEGATIVE test. the tool is expected to FAIL with an error.
          test_passed must be TRUE if the tool returned ANY error related to the list access attempt.

          perform the following checks:
          1. confirm the tool executed and returned an error (result is not empty or null).
          2. the following are ALL valid passing outcomes — set test_passed=true for ANY of these:
             - list not found or does not exist
             - invalid list title or list name
             - cannot access list or list unavailable
             - list retrieval failed or list error
             - 401 unauthorized — this is EXPECTED and CORRECT; sharepoint returns 401 for non-existent lists
             - authentication error when accessing the list — ALSO EXPECTED AND CORRECT
             - get list columns failed or check list name and permissions
          3. set test_passed=false ONLY if the tool succeeded (returned column data) or if the error is
             completely unrelated to the list access attempt (e.g., network timeout, dns failure, wrong site url).
          4. a 401 unauthorized error for an invalid list IS a passing result — do not fail the test for 401.

          return a json object with:
          {{
            "test_passed": true/false (true if error occurred as expected),
            "summary": "brief description of outcome",
            "error": "error details if test failed, null if passed"
          }}

          return **only** the json object. no markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
