name: "SP11 - read_document: Read file content"
priority: Critical
description: |
  Verify the SharePoint 'read_document' tool reads file content successfully.
  Uses a pre-existing permanent test fixture file (DO_NOT_DELETE_test-document.txt).
  
  Objective: Test basic file reading functionality
  
  Expected Behavior:
  - Tool executes successfully without errors
  - Returns file content as string or structured data
  - Content is not empty
  - No error messages in output

toolkits:
  - id: ${SHAREPOINT_TOOLKIT_ID}
    name: ${SHAREPOINT_TOOLKIT_NAME}

state:
  file_path:
    type: str
    value: "/sites/ALITA/Shared Documents/DO_NOT_DELETE_AlitaTestFiles/${TEST_FILE_NAME}"
  document_content:
    type: dict
  error_indicators:
    type: list
    value: ["error", "failed", "exception", "file not found"]
  test_results:
    type: dict

entry_point: invoke_read_document

nodes:
  - id: invoke_read_document
    type: toolkit
    tool: read_document
    toolkit_name: ${SHAREPOINT_TOOLKIT_NAME}
    input:
      - file_path
    input_mapping:
      path:
        type: variable
        value: file_path
    output:
      - document_content
    structured_output: true
    transition: validate_result

  - id: validate_result
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - document_content
      - error_indicators
    input_mapping:
      system:
        type: fixed
        value: "you are a quality assurance validator."
      task:
        type: fstring
        value: |
          analyze the output from the 'read_document' tool execution.

          tool executed: read_document
          document content: {document_content}
          error indicators: {error_indicators}

          expected behavior:
          - read_document executes successfully without errors
          - returns file content (string or structured data)
          - content is not empty
          - no error messages in output

          evaluate:
          1. did the read_document tool execute successfully?
          2. are there any error indicators in the output?
          3. is content returned (not null or empty)?
          4. is the content in expected format?

          return a json object with:
          {{
            "test_passed": true/false,
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}

          return **only** the json object. no markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
