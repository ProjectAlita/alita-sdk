name: "PST33 move folder to root"
priority: High
description: |
  Validates that the move_folder tool can move a folder to the root level
  of the collection by setting target_path to null or empty.
  
  Objective: Verify moving folder to root level
  
  Expected Behavior:
  - Tool executes successfully
  - Folder is moved to collection root
  - Folder becomes a top-level folder
  - Returns confirmation of the move

toolkits:
  - id: ${TOOLKIT_ID}
    name: ${TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  source_folder_name:
    type: str
  source_path:
    type: str
  target_path:
    type: str
    value: null
  create_source_result:
    type: str
  delete_source_result:
    type: str

entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        source_folder_name = f"PST33_Folder_{timestamp}_{suffix}"
        source_path = source_folder_name
        {"source_folder_name": source_folder_name, "source_path": source_path}
    output:
      - source_folder_name
      - source_path
    structured_output: true
    transition: create_source_folder

  - id: create_source_folder
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: create_folder
    input:
      - source_folder_name
    input_mapping:
      name:
        type: variable
        value: source_folder_name
    output:
      - create_source_result
    structured_output: true
    transition: invoke_move_folder

  - id: invoke_move_folder
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: move_folder
    input:
      - source_path
      - target_path
    input_mapping:
      source_path:
        type: variable
        value: source_path
      target_path:
        type: variable
        value: target_path
    output:
      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'move_folder' tool for moving to root.
          
          Tool Result: {tool_result}
          
          This test validates that move_folder can move a folder to root level.
          
          Perform the following checks:
          1. Confirm the tool executed successfully.
          2. Verify the folder was moved to root level.
          3. Check for success confirmation.
          4. Validate the folder is now a top-level folder.
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if folder was moved to root successfully),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: cleanup_delete_folder

  - id: cleanup_delete_folder
    type: toolkit
    continue_on_error: true
    toolkit_name: ${TOOLKIT_NAME}
    tool: delete_folder
    input:
      - source_path
    input_mapping:
      folder_path:
        type: variable
        value: source_path
    output:
      - delete_source_result
    structured_output: true
    transition: END
