name: "PST19 execute request with"
priority: High
description: |
  Validates that the execute_request tool properly handles variable overrides,
  allowing custom values to be passed at execution time.
  
  Objective: Verify request execution with override variables
  
  Expected Behavior:
  - Tool executes with override variables
  - Override values take precedence over environment/collection variables
  - Request uses overridden values correctly
  - Response reflects the overridden parameters

toolkits:
  - id: ${POSTMAN_TOOLKIT_ID}
    name: ${POSTMAN_TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  folder_name:
    type: str
  request_name:
    type: str
  folder_path:
    type: str
  request_path:
    type: str
  create_folder_result:
    type: str
  create_request_result:
    type: str
  delete_request_result:
    type: str
  delete_folder_result:
    type: str
  override_variables:
    type: dict
    value:
      test_var: "override_value"
entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        folder_name = f"PST19_Folder_{timestamp}_{suffix}"
        request_name = f"PST19_Request_{timestamp}_{suffix}"
        folder_path = folder_name
        request_path = f"{folder_name}/{request_name}"
        {"folder_name": folder_name, "request_name": request_name, "folder_path": folder_path, "request_path": request_path}
    output:
      - folder_name
      - request_name
      - folder_path
      - request_path
    structured_output: true
    transition: create_test_folder

  - id: create_test_folder
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_folder
    input:
      - folder_name
    input_mapping:
      name:
        type: variable
        value: folder_name
    output:
      - create_folder_result
    structured_output: true
    transition: create_test_request

  - id: create_test_request
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_request
    input:
      - folder_path
      - request_name
    input_mapping:
      folder_path:
        type: variable
        value: folder_path
      name:
        type: variable
        value: request_name
      method:
        type: fixed
        value: "GET"
      url:
        type: fixed
        value: "https://httpbin.org/get"
    output:
      - create_request_result
    structured_output: true
    transition: invoke_execute_request

  - id: invoke_execute_request
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: execute_request
    continue_on_error: true
    input:
      - request_path
      - override_variables
    input_mapping:
      request_path:
        type: variable
        value: request_path
      override_variables:
        type: variable
        value: override_variables
    output:
      - tool_result
    structured_output: true
    transition: validate_results

  - id: validate_results
    type: llm
    model: ${DEFAULT_LLM_MODEL}
    input:
      - create_folder_result
      - create_request_result
      - tool_result
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: "You are a strict quality assurance validator. Only return valid JSON."
      task:
        type: fstring
        value: |
          Analyze the output from Postman request execution with override variables.

          Folder Creation Result: {create_folder_result}
          Request Creation Result: {create_request_result}
          Execute Request Result: {tool_result}

          This is a POSITIVE test - we expect successful request execution with overrides.

          Validation Criteria (ALL must pass for test_passed=true):
          1. folder_created: Folder was created successfully
          2. request_created: Request was created successfully
          3. request_executed: execute_request was called with override_variables (dict type accepted)
          4. no_setup_errors: No errors in folder/request creation

          Note: Accept the test as passed if the tool attempted execution (even if URL unreachable).

          Return JSON:
          {{
            "test_passed": boolean (true only if ALL criteria pass),
            "folder_created": boolean,
            "request_created": boolean,
            "request_executed": boolean,
            "no_setup_errors": boolean,
            "summary": "brief description of outcome",
            "error": string | null
          }}

          Return ONLY the JSON object. No markdown formatting.
    output:
      - test_results
    structured_output_dict:
      test_results: dict
    transition: cleanup_delete_request

  - id: cleanup_delete_request
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_request
    input:
      - request_path
    input_mapping:
      request_path:
        type: variable
        value: request_path
    output:
      - delete_request_result
    structured_output: true
    transition: cleanup_delete_folder

  - id: cleanup_delete_folder
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_folder
    input:
      - folder_path
    input_mapping:
      folder_path:
        type: variable
        value: folder_path
    output:
      - delete_folder_result
    structured_output: true
    transition: END
