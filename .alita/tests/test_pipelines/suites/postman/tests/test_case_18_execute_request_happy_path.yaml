name: "PST18 execute request happy path"
priority: Critical
description: |
  Validates that the execute_request tool successfully executes a Postman request
  with environment variables and custom configuration.
  
  Objective: Verify request execution functionality
  
  Expected Behavior:
  - Tool executes the specified request
  - Environment variables are properly resolved
  - Returns HTTP response details (status, headers, body)
  - Request completes without errors

toolkits:
  - id: ${TOOLKIT_ID}
    name: ${TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  request_path:
    type: str
  folder_name:
    type: str
  request_name:
    type: str
  create_folder_result:
    type: str
  create_request_result:
    type: str
  delete_request_result:
    type: str
  delete_folder_result:
    type: str
entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        folder_name = f"PST18_Folder_{timestamp}_{suffix}"
        request_name = f"PST18_Request_{timestamp}_{suffix}"
        {
          "folder_name": folder_name,
          "request_name": request_name,
          "request_path": f"{folder_name}/{request_name}"
        }
    output:
      - folder_name
      - request_name
      - request_path
    structured_output: true
    transition: create_test_folder

  - id: create_test_folder
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: create_folder
    input:
      - folder_name
    input_mapping:
      name:
        type: variable
        value: folder_name
    output:
      - create_folder_result
    structured_output: true
    transition: create_test_request

  - id: create_test_request
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: create_request
    input:
      - folder_name
      - request_name
    input_mapping:
      folder_path:
        type: variable
        value: folder_name
      name:
        type: variable
        value: request_name
      method:
        type: fixed
        value: "GET"
      url:
        type: fixed
        value: "https://httpbin.org/get"
    output:
      - create_request_result
    structured_output: true
    transition: invoke_execute_request

  - id: invoke_execute_request
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: execute_request
    input:
      - request_path
    input_mapping:
      request_path:
        type: variable
        value: request_path
    output:

      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'execute_request' tool.
          
          Tool Result: {tool_result}
          
          This test validates that execute_request executes a request and returns response.
          
          Perform the following checks:
          1. Confirm the tool executed successfully.
          2. Verify the result contains HTTP response information.
          3. Check for response status code, headers, or body.
          4. Validate that the request was actually executed.
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if request was executed successfully),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: cleanup_request

  - id: cleanup_request
    type: toolkit
    continue_on_error: true
    toolkit_name: ${TOOLKIT_NAME}
    tool: delete_request
    input:
      - request_path
    input_mapping:
      request_path:
        type: variable
        value: request_path
    output:
      - delete_request_result
    structured_output: true
    transition: cleanup_folder

  - id: cleanup_folder
    type: toolkit
    continue_on_error: true
    toolkit_name: ${TOOLKIT_NAME}
    tool: delete_folder
    input:
      - folder_name
    input_mapping:
      folder_path:
        type: variable
        value: folder_name
    output:
      - delete_folder_result
    structured_output: true
    transition: END
