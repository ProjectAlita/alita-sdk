name: "PST57 move request to root"
priority: High
description: |
  Validates that the move_request tool successfully moves a request to the
  collection root level (no parent folder).
  
  Objective: Verify request move to root functionality

toolkits:
  - id: ${TOOLKIT_ID}
    name: ${TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  folder_name:
    type: str
  request_name:
    type: str
  folder_path:
    type: str
  request_path:
    type: str
  create_folder_result:
    type: str
  create_request_result:
    type: str
  delete_result:
    type: str

entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time, random, string
        ts = time.strftime('%Y%m%d-%H%M%S')
        sfx = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        folder_name = f"PST57_Folder_{ts}_{sfx}"
        request_name = f"PST57_Request_{ts}_{sfx}"
        folder_path = folder_name
        request_path = f"{folder_name}/{request_name}"
        {"folder_name": folder_name, "request_name": request_name, "folder_path": folder_path, "request_path": request_path}
    output:
      - folder_name
      - request_name
      - folder_path
      - request_path
    structured_output: true
    transition: create_test_folder

  - id: create_test_folder
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: create_folder
    input:
      - folder_name
    input_mapping:
      name:
        type: variable
        value: folder_name
    output:
      - create_folder_result
    structured_output: true
    transition: create_test_request

  - id: create_test_request
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: create_request
    input:
      - folder_path
      - request_name
    input_mapping:
      folder_path:
        type: variable
        value: folder_path
      name:
        type: variable
        value: request_name
      method:
        type: fixed
        value: "GET"
      url:
        type: fixed
        value: "https://api.example.com/test"
    output:
      - create_request_result
    structured_output: true
    transition: invoke_move_request

  - id: invoke_move_request
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: move_request
    input:
      - request_path
    input_mapping:
      source_path:
        type: variable
        value: request_path
      target_path:
        type: fixed
        value: null
    output:
      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'move_request' tool for moving to root.
          
          Tool Result: {tool_result}
          
          This test validates that move_request can move a request to collection root.
          
          Perform the following checks:
          1. Confirm the tool executed successfully.
          2. Verify the request was moved to root level.
          3. Check for success confirmation.
          4. Validate the request is now a top-level item.
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if request was moved to root successfully),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
