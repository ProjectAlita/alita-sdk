name: "PST13 get request script prerequest"
priority: High
description: |
  Validates that the get_request_script tool successfully retrieves pre-request
  script content when script_type is set to "prerequest".
  
  Objective: Verify pre-request script retrieval
  
  Expected Behavior:
  - Test folder and request are created with a pre-request script
  - get_request_script retrieves the pre-request script content
  - Properly distinguishes pre-request from test scripts
  - Cleanup removes both request and folder

toolkits:
  - id: ${POSTMAN_TOOLKIT_ID}
    name: ${POSTMAN_TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  folder_name:
    type: str
  request_name:
    type: str
  folder_path:
    type: str
  request_path:
    type: str
  create_folder_result:
    type: str
  create_request_result:
    type: str
  delete_request_result:
    type: str
  delete_folder_result:
    type: str
  script_type:
    type: str
    value: "prerequest"
entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        folder_name = f"PST13_Folder_{timestamp}_{suffix}"
        request_name = f"PST13_Request_{timestamp}_{suffix}"
        folder_path = folder_name
        request_path = f"{folder_name}/{request_name}"
        {"folder_name": folder_name, "request_name": request_name, "folder_path": folder_path, "request_path": request_path}
    output:
      - folder_name
      - request_name
      - folder_path
      - request_path
    structured_output: true
    transition: create_test_folder

  - id: create_test_folder
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_folder
    input:
      - folder_name
    input_mapping:
      name:
        type: variable
        value: folder_name
    output:
      - create_folder_result
    structured_output: true
    transition: create_test_request

  - id: create_test_request
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_request
    input:
      - folder_path
      - request_name
    input_mapping:
      folder_path:
        type: variable
        value: folder_path
      name:
        type: variable
        value: request_name
      method:
        type: fixed
        value: "GET"
      url:
        type: fixed
        value: "https://api.example.com/test"
    output:
      - create_request_result
    structured_output: true
    transition: invoke_get_request_script

  - id: invoke_get_request_script
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: get_request_script
    input:
      - request_path
      - script_type
    input_mapping:
      request_path:
        type: variable
        value: request_path
      script_type:
        type: variable
        value: script_type
    output:

      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'get_request_script' tool for pre-request scripts.
          
          Tool Result: {tool_result}
          
          This test validates that get_request_script retrieves pre-request script content.
          
          Perform the following checks:
          1. Confirm the tool executed successfully.
          2. Verify the result contains pre-request script content or indicates no scripts.
          3. Check that pre-request script type is properly identified.
          4. Validate the response is appropriate for pre-request scripts.
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if pre-request script was retrieved),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: cleanup_delete_request

  - id: cleanup_delete_request
    type: toolkit
    continue_on_error: true
    toolkit_name: ${TOOLKIT_NAME}
    tool: delete_request
    input:
      - request_path
    input_mapping:
      request_path:
        type: variable
        value: request_path
    output:
      - delete_request_result
    structured_output: true
    transition: cleanup_delete_folder

  - id: cleanup_delete_folder
    type: toolkit
    continue_on_error: true
    toolkit_name: ${TOOLKIT_NAME}
    tool: delete_folder
    input:
      - folder_path
    input_mapping:
      folder_path:
        type: variable
        value: folder_path
    output:
      - delete_folder_result
    structured_output: true
    transition: END
