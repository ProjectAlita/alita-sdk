name: "PST44 update request headers"
priority: Critical
description: |
  Validates that the update_request_headers tool successfully updates
  the headers of an existing request.
  
  Objective: Verify request headers update functionality
  
  Expected Behavior:
  - Tool executes successfully
  - Request headers are updated
  - Header structure includes key, value, enabled
  - Returns confirmation of the update

toolkits:
  - id: ${TOOLKIT_ID}
    name: ${TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  folder_name:
    type: str
  request_name:
    type: str
  folder_path:
    type: str
  request_path:
    type: str
  headers:
    type: str
    value: "Authorization: Bearer test_token\nContent-Type: application/json"
  create_folder_result:
    type: str
  create_request_result:
    type: str
  delete_request_result:
    type: str
  delete_folder_result:
    type: str

entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        folder_name = f"PST44_Folder_{timestamp}_{suffix}"
        request_name = f"PST44_Request_{timestamp}_{suffix}"
        folder_path = folder_name
        request_path = f"{folder_name}/{request_name}"
        {"folder_name": folder_name, "request_name": request_name, "folder_path": folder_path, "request_path": request_path}
    output:
      - folder_name
      - request_name
      - folder_path
      - request_path
    structured_output: true
    transition: create_test_folder

  - id: create_test_folder
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: create_folder
    input:
      - folder_name
    input_mapping:
      name:
        type: variable
        value: folder_name
    output:
      - create_folder_result
    structured_output: true
    transition: create_test_request

  - id: create_test_request
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: create_request
    input:
      - folder_path
      - request_name
    input_mapping:
      folder_path:
        type: variable
        value: folder_path
      name:
        type: variable
        value: request_name
      method:
        type: fixed
        value: "GET"
      url:
        type: fixed
        value: "https://api.example.com/test"
    output:
      - create_request_result
    structured_output: true
    transition: invoke_update_request_headers

  - id: invoke_update_request_headers
    type: toolkit
    toolkit_name: ${TOOLKIT_NAME}
    tool: update_request_headers
    input:
      - request_path
      - headers
    input_mapping:
      request_path:
        type: variable
        value: request_path
      headers:
        type: variable
        value: headers
    output:
      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: gpt-4o-2024-11-20
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'update_request_headers' tool.
          
          Tool Result: {tool_result}
          
          This test validates that update_request_headers updates the headers.
          
          Perform the following checks:
          1. Confirm the tool executed successfully.
          2. Verify the result indicates headers were updated.
          3. Check for success confirmation.
          4. Validate the header structure was properly processed.
          
          Return a JSON object named test_results with the following structure:
          
          {{
            "test_passed": boolean (true if headers were updated successfully),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          
          Return **ONLY** the JSON object. No markdown formatting, no additional text.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: END
