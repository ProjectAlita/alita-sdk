name: "PST34 create request happy path"
priority: Critical
description: |
  Validates that the create_request tool successfully creates a new API request
  in a folder with basic properties.

toolkits:
  - id: ${POSTMAN_TOOLKIT_ID}
    name: ${POSTMAN_TOOLKIT_NAME}

state:
  tool_result:
    type: dict
  test_results:
    type: dict
  folder_name:
    type: str
  folder_path:
    type: str
  request_name:
    type: str
    value: "Test_API_Request"
  method:
    type: str
    value: "GET"
  url:
    type: str
    value: "https://api.example.com/test"
  create_folder_result:
    type: str
  delete_request_result:
    type: str
  delete_folder_result:
    type: str

entry_point: prepare_test_data

nodes:
  - id: prepare_test_data
    type: code
    code:
      type: fixed
      value: |
        import time
        import random
        import string
        timestamp = time.strftime('%Y%m%d-%H%M%S')
        suffix = ''.join(random.choices(string.ascii_lowercase + string.digits, k=4))
        folder_name = f"PST34_Folder_{timestamp}_{suffix}"
        folder_path = folder_name
        {"folder_name": folder_name, "folder_path": folder_path}
    output:
      - folder_name
      - folder_path
    structured_output: true
    transition: create_test_folder

  - id: create_test_folder
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_folder
    input:
      - folder_name
    input_mapping:
      name:
        type: variable
        value: folder_name
    output:
      - create_folder_result
    structured_output: true
    transition: invoke_create_request

  - id: invoke_create_request
    type: toolkit
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: create_request
    input:
      - folder_path
      - request_name
      - method
      - url
    input_mapping:
      folder_path:
        type: variable
        value: folder_path
      name:
        type: variable
        value: request_name
      method:
        type: variable
        value: method
      url:
        type: variable
        value: url
    output:
      - tool_result
    structured_output: true
    transition: process_results

  - id: process_results
    type: llm
    model: ${DEFAULT_LLM_MODEL}
    input:
      - tool_result
    input_mapping:
      system:
        type: fixed
        value: "You are a quality assurance validator."
      task:
        type: fstring
        value: |
          Analyze the output from the 'create_request' tool.
          
          Tool Result: {tool_result}
          
          Perform the following checks:
          1. Confirm the tool executed successfully (no ToolException).
          2. Verify the result contains a success message indicating the request was created.
          
          IMPORTANT: The tool returns a message like "Request 'X' created successfully" - this is the expected success format.
          test_passed should be true if the message indicates successful creation and contains no error.
          
          Return a JSON object:
          {{
            "test_passed": boolean (true if request was created successfully),
            "summary": "brief description of outcome",
            "error": "error details if failed, null if passed"
          }}
          Return **ONLY** the JSON object.
      chat_history:
        type: fixed
        value: []
    output:
      - test_results
    structured_output_dict:
      test_results: "dict"
    transition: cleanup_delete_request

  - id: cleanup_delete_request
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_request
    input:
      - folder_path
      - request_name
    input_mapping:
      request_path:
        type: fstring
        value: "{folder_path}/{request_name}"
    output:
      - delete_request_result
    structured_output: true
    transition: cleanup_delete_folder

  - id: cleanup_delete_folder
    type: toolkit
    continue_on_error: true
    toolkit_name: ${POSTMAN_TOOLKIT_NAME}
    tool: delete_folder
    input:
      - folder_path
    input_mapping:
      folder_path:
        type: variable
        value: folder_path
    output:
      - delete_folder_result
    structured_output: true
    transition: END
