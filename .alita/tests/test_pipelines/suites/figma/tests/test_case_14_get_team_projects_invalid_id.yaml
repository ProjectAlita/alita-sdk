name: "FIG14 - Get Team Projects: Invalid ID"
description: "Test get_team_projects error handling with invalid team ID"

toolkits:
  - id: ${FIGMA_TOOLKIT_ID}
    name: ${FIGMA_TOOLKIT_NAME}

state:
  invalid_team_id:
    type: str
    value: "INVALID_TEAM_ID_99999"
  test_results:
    type: dict
  tool_result:
    type: dict

entry_point: invoke_get_team_projects_invalid

nodes:
  - id: invoke_get_team_projects_invalid
    type: toolkit
    input:
      - invalid_team_id
    input_mapping:
      team_id:
        type: variable
        value: invalid_team_id
    output:
      - tool_result
    structured_output: true
    continue_on_error: true
    tool: get_team_projects
    toolkit_name: ${FIGMA_TOOLKIT_NAME}
    transition: validate_error_response

  - id: validate_error_response
    type: llm
    input:
      - tool_result
      - invalid_team_id
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: You are a quality assurance validator for Figma API error handling testing.
      task:
        type: fstring
        value: |-
          Analyze the output from 'get_team_projects' with an invalid team ID.

          Tool Output: {tool_result}
          Invalid Team ID Used: {invalid_team_id}

          Validation Criteria:
          1. Tool Execution: Confirm the tool was called (tool_executed=true).
          2. Error Handling: The tool returned an error message indicating team not found or unauthorized (HTTP 403/404). Set appropriate_error_message=true if the error contains "404", "Not found", "403", or "unauthorized".
          3. Graceful Failure: The tool raised a ToolException with a clear error message. Stack traces in the tool output are a NORMAL framework artifact and do NOT indicate ungraceful failure. Set error_handled_gracefully=true if the tool raised a ToolException with a meaningful error message (e.g. "Figma API error 404").

          IMPORTANT: Set test_passed=true if ALL of the following are true: tool_executed=true AND error_handled_gracefully=true AND appropriate_error_message=true.
          Do NOT fail the test because of stack traces in the output — they are expected and normal.

          Return a JSON object named test_results with this EXACT structure:
          {
            "test_passed": boolean (true if tool_executed AND error_handled_gracefully AND appropriate_error_message),
            "tool_executed": boolean,
            "operation_succeeded": false,
            "error_handled_gracefully": boolean,
            "appropriate_error_message": boolean,
            "error": string or null,
            "message_snippet": "Brief summary of error handling"
          }

          IMPORTANT: Return ONLY the test_results JSON object, no additional text.
    model: ${DEFAULT_LLM_MODEL:gpt-4o}
    output:
      - test_results
    structured_output_dict:
      test_results: dict
    transition: END