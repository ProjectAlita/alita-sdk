state:
  all_fetched_items:
    type: list
    value: []
  all_item_ids:
    type: list
    value: []
  artifact_filepath:
    type: string
    value: ''
  current_parent_ids:
    type: list
    value: []
  current_query:
    type: string
    value: ''
  epic_data:
    type: dict
    value: {}
  epic_id:
    type: int
    value: 0
  epic_ids_to_process:
    type: list
    value: []
  current_epic_index:
    type: int
    value: 0
  processed_results:
    type: list
    value: []
  output_expand:
    type: bool
    value: true
  output_name:
    type: string
    value: ''
  error_message:
    type: string
    value: ''
  has_more_epics:
    type: bool
    value: false
  has_more_levels:
    type: bool
    value: false
  hierarchy_data:
    type: dict
    value: {}
  hierarchy_markdown:
    type: string
    value: ''
  input:
    type: string
  operation_result:
    type: string
    value: ''
  readiness_report:
    type: dict
    value: {}
  validation_passed:
    type: bool
    value: false
  level_items:
    type: list
    value: []
  md_filepath:
    type: string
    value: ''
entry_point: ParseInput
nodes:
  - id: ParseInput
    type: code
    code:
      type: fixed
      value: |-
        import json
        
        input_str = alita_state.get('input', '').strip()
        
        # Step 1: Check if input is provided
        if not input_str:
            result = {
                "validation_passed": False,
                "error_message": "Input is required. Please provide JSON: {\"ids\": [9, 42], \"output_expand\": true}",
                "epic_ids_to_process": [],
                "current_epic_index": 0,
                "output_expand": True,
                "output_name": ""
            }
        else:
            # Step 2: Try to parse JSON
            try:
                input_data = json.loads(input_str)
            except json.JSONDecodeError:
                result = {
                    "validation_passed": False,
                    "error_message": "Input is not parsable json. Expected format: {\"ids\": [9, 42], \"output_expand\": true, \"output_name\": \"optional\"}",
                    "epic_ids_to_process": [],
                    "current_epic_index": 0,
                    "output_expand": True,
                    "output_name": ""
                }
            else:
                # Step 3: Validate JSON structure and types
                if not isinstance(input_data, dict):
                    result = {
                        "validation_passed": False,
                        "error_message": "Input must be a JSON object. Expected: {\"ids\": [9, 42], \"output_expand\": true}",
                        "epic_ids_to_process": [],
                        "current_epic_index": 0,
                        "output_expand": True,
                        "output_name": ""
                    }
                elif 'ids' not in input_data:
                    result = {
                        "validation_passed": False,
                        "error_message": "Missing required field 'ids'. Expected: {\"ids\": [9, 42], \"output_expand\": true}",
                        "epic_ids_to_process": [],
                        "current_epic_index": 0,
                        "output_expand": input_data.get('output_expand', True),
                        "output_name": input_data.get('output_name', '')
                    }
                elif not isinstance(input_data['ids'], list):
                    result = {
                        "validation_passed": False,
                        "error_message": "Field 'ids' must be an array. Expected: {\"ids\": [9, 42], \"output_expand\": true}",
                        "epic_ids_to_process": [],
                        "current_epic_index": 0,
                        "output_expand": input_data.get('output_expand', True),
                        "output_name": input_data.get('output_name', '')
                    }
                elif len(input_data['ids']) == 0:
                    result = {
                        "validation_passed": False,
                        "error_message": "Field 'ids' must contain at least one element. Expected: {\"ids\": [9, 42], \"output_expand\": true}",
                        "epic_ids_to_process": [],
                        "current_epic_index": 0,
                        "output_expand": input_data.get('output_expand', True),
                        "output_name": input_data.get('output_name', '')
                    }
                else:
                    # Step 4: Validate output_expand type if provided
                    output_expand = input_data.get('output_expand', True)
                    output_name = input_data.get('output_name', '')
                    
                    if 'output_expand' in input_data and not isinstance(output_expand, bool):
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'output_expand' must be a boolean (true or false). Expected: {\"ids\": [9, 42], \"output_expand\": true}",
                            "epic_ids_to_process": [],
                            "current_epic_index": 0,
                            "output_expand": True,
                            "output_name": ""
                        }
                    elif 'output_name' in input_data and not isinstance(output_name, str):
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'output_name' must be a string. Expected: {\"ids\": [9, 42], \"output_expand\": true, \"output_name\": \"my_run\"}",
                            "epic_ids_to_process": [],
                            "current_epic_index": 0,
                            "output_expand": True,
                            "output_name": ""
                        }
                    else:
                        # Step 5: Validate ID values
                        epic_ids = []
                        invalid_ids = []
                        
                        for id_value in input_data['ids']:
                            try:
                                epic_id = int(id_value)
                                if epic_id <= 0:
                                    invalid_ids.append(str(id_value))
                                else:
                                    epic_ids.append(epic_id)
                            except (ValueError, TypeError):
                                invalid_ids.append(str(id_value))
                        
                        if invalid_ids:
                            result = {
                                "validation_passed": False,
                                "error_message": f"Invalid work item ID(s): {', '.join(invalid_ids)}. All IDs must be positive integers.",
                                "epic_ids_to_process": [],
                                "current_epic_index": 0,
                                "output_expand": output_expand,
                                "output_name": output_name
                            }
                        elif not epic_ids:
                            result = {
                                "validation_passed": False,
                                "error_message": "No valid work item IDs found. All IDs must be positive integers.",
                                "epic_ids_to_process": [],
                                "current_epic_index": 0,
                                "output_expand": output_expand,
                                "output_name": output_name
                            }
                        else:
                            # All validations passed - generate output_name if not provided
                            import random
                            import string
                            
                            if not output_name or not output_name.strip():
                                output_name = ''.join(random.choices(string.ascii_lowercase + string.digits, k=8))
                            
                            result = {
                                "validation_passed": True,
                                "error_message": "",
                                "epic_ids_to_process": epic_ids,
                                "current_epic_index": 0,
                                "processed_results": [],
                                "output_expand": output_expand,
                                "output_name": output_name
                            }
        
        result
    input:
      - input
    output:
      - validation_passed
      - error_message
      - epic_ids_to_process
      - current_epic_index
      - processed_results
      - output_expand
      - output_name
    structured_output: true
    transition: ValidationRouter
  - id: ValidationRouter
    type: router
    condition: |
      {% if validation_passed %}
        SetCurrentEpicId
      {% else %}
        FormatErrorResult
      {% endif %}
    default_output: FormatErrorResult
    input:
      - validation_passed
    routes:
      - SetCurrentEpicId
      - FormatErrorResult
  - id: SetCurrentEpicId
    type: code
    code:
      type: fixed
      value: |-
        epic_ids_to_process = alita_state.get('epic_ids_to_process', [])
        current_epic_index = alita_state.get('current_epic_index', 0)
        
        # Extract nested if needed
        if isinstance(epic_ids_to_process, dict) and 'epic_ids_to_process' in epic_ids_to_process:
            epic_ids_to_process = epic_ids_to_process['epic_ids_to_process']
        if isinstance(current_epic_index, dict) and 'current_epic_index' in current_epic_index:
            current_epic_index = current_epic_index['current_epic_index']
        
        # Check if we have more IDs to process
        if current_epic_index < len(epic_ids_to_process):
            epic_id = epic_ids_to_process[current_epic_index]
            has_more = True
        else:
            epic_id = 0
            has_more = False
        
        {
            "epic_id": epic_id,
            "has_more_epics": has_more
        }
    input:
      - epic_ids_to_process
      - current_epic_index
    output:
      - epic_id
      - has_more_epics
    structured_output: true
    transition: CheckMoreEpicsRouter
  - id: CheckMoreEpicsRouter
    type: router
    condition: |
      {% if has_more_epics %}
        FetchEpic
      {% else %}
        CompileResults
      {% endif %}
    default_output: CompileResults
    input:
      - has_more_epics
    routes:
      - FetchEpic
      - CompileResults
  - id: FetchEpic
    type: toolkit
    input:
      - epic_id
    input_mapping:
      id:
        type: variable
        value: epic_id
      expand:
        type: fixed
        value: All
    on_error:
      transition: HandleFetchError
    output:
      - epic_data
    structured_output: true
    tool: get_work_item
    toolkit_name: LFAADOBoardReader
    transition: ValidateEpicData
  - id: ValidateEpicData
    type: code
    code:
      type: fixed
      value: |-
        epic_data = alita_state.get('epic_data', {})
        epic_id = alita_state.get('epic_id')

        # Check if epic_data is valid
        if not epic_data or not isinstance(epic_data, dict):
            validation_passed = False
            error_message = f"Work item {epic_id} does not exist or could not be retrieved from Azure DevOps. Please verify the item ID and try again."
        elif 'System.Id' not in epic_data and 'id' not in epic_data:
            validation_passed = False
            error_message = f"Invalid response received for work item {epic_id}. The item may not exist or may be inaccessible."
        else:
            validation_passed = True
            error_message = ""

        {
            "validation_passed": validation_passed,
            "error_message": error_message
        }
    input:
      - epic_data
      - epic_id
    output:
      - validation_passed
      - error_message
    structured_output: true
    transition: EpicValidationRouter
  - id: EpicValidationRouter
    type: router
    condition: |
      {% if validation_passed %}
        InitializeFetch
      {% else %}
        FormatErrorResult
      {% endif %}
    default_output: FormatErrorResult
    input:
      - validation_passed
    routes:
      - InitializeFetch
      - FormatErrorResult
  - id: HandleFetchError
    type: code
    code:
      type: fixed
      value: |-
        epic_id = alita_state.get('epic_id')

        {
            "validation_passed": False,
            "error_message": f"Failed to fetch work item {epic_id} from Azure DevOps. The item may not exist, or you may not have permission to access it. Please verify the item ID and your access permissions."
        }
    input:
      - epic_id
    output:
      - validation_passed
      - error_message
    structured_output: true
    transition: FormatErrorResult
  - id: FormatErrorResult
    type: state_modifier
    input:
      - error_message
      - epic_id
    output:
      - operation_result
    template: '{"operation": "fetch_hierarchy", "status": "error", "item_id": {{ epic_id }}, "error": "{{ error_message | replace(''"'', ''\\"'') }}"}'
    transition: ReplyComposer
    variables_to_clean: []
  - id: InitializeFetch
    type: code
    code:
      type: fixed
      value: |-
        epic_id = alita_state.get('epic_id')

        # Build WIQL query for direct children (including description field)
        current_query = f"SELECT [System.Id], [System.Title], [System.State], [System.WorkItemType], [System.Parent], [System.Description] FROM WorkItems WHERE [System.Parent] = {epic_id}"

        result = {
            "current_query": current_query,
            "all_item_ids": [],
            "all_fetched_items": [],
            "current_parent_ids": [epic_id],  # Track which parent IDs we're querying for
            "artifact_filepath": ""  # Clear filepath for new epic - will be auto-generated
        }
        result
    input:
      - epic_id
    output:
      - current_query
      - all_item_ids
      - all_fetched_items
      - current_parent_ids
      - artifact_filepath
    structured_output: true
    transition: FetchLevel
  - id: FetchLevel
    type: toolkit
    input:
      - current_query
      - current_parent_ids
    input_mapping:
      fields:
        type: fixed
        value:
          - System.Id
          - System.Title
          - System.State
          - System.WorkItemType
          - System.Parent
          - System.Description
          - System.AssignedTo
          - System.Reason
          - System.CreatedDate
          - System.ChangedDate
      limit:
        type: fixed
        value: 1000
      query:
        type: variable
        value: current_query
    on_error:
      transition: CleanHierarchyData
    output:
      - level_items
    structured_output: true
    tool: search_work_items
    toolkit_name: LFAADOBoardReader
    transition: ProcessLevel
  - id: ProcessLevel
    type: code
    code:
      type: fixed
      value: |-
        level_items = alita_state.get('level_items', [])
        all_item_ids = alita_state.get('all_item_ids', [])
        all_fetched_items = alita_state.get('all_fetched_items', [])
        current_parent_ids = alita_state.get('current_parent_ids', [])

        # Extract nested values if they're result dicts
        if isinstance(all_item_ids, dict) and 'all_item_ids' in all_item_ids:
            all_item_ids = all_item_ids['all_item_ids']
        if isinstance(all_fetched_items, dict) and 'all_fetched_items' in all_fetched_items:
            all_fetched_items = all_fetched_items['all_fetched_items']
        if isinstance(level_items, dict) and 'level_items' in level_items:
            level_items = level_items['level_items']
        if isinstance(current_parent_ids, dict) and 'current_parent_ids' in current_parent_ids:
            current_parent_ids = current_parent_ids['current_parent_ids']

        # Handle string response (no items found) or None
        if not isinstance(level_items, list):
            level_items = []

        # Collect IDs from this level and assign parent relationships
        child_ids = []
        for item in level_items:
            item_id = item.get('id') or item.get('System.Id')
            if item_id and item_id not in all_item_ids:
                # Try to get System.Parent from response, but ADO often doesn't return it
                explicit_parent = item.get('System.Parent')
                # If System.Parent is not in response, infer from query
                # When we query "WHERE [System.Parent] IN (10,18)", we know parent is one of [10,18]
                # For single parent queries initially, use the first parent_id
                if not explicit_parent and current_parent_ids:
                    # Store which parent query fetched this item
                    # If multiple parents, we can't determine exact parent without the field
                    # But for most cases, items fetched in one batch share same parent level
                    item['_inferred_parent_from_query'] = current_parent_ids
                child_ids.append(item_id)
                all_item_ids.append(item_id)
                all_fetched_items.append(item)

        # Build query for next level (children of current level), including description field
        if child_ids:
            ids_str = ','.join(map(str, child_ids))
            next_query = f"SELECT [System.Id], [System.Title], [System.State], [System.WorkItemType], [System.Parent], [System.Description] FROM WorkItems WHERE [System.Parent] IN ({ids_str})"
            next_parent_ids = child_ids  # Next level will be children of these IDs
            has_more = True
        else:
            next_query = ""
            next_parent_ids = []
            has_more = False

        result = {
            "current_query": next_query,
            "all_item_ids": all_item_ids,
            "all_fetched_items": all_fetched_items,
            "has_more_levels": has_more,
            "current_parent_ids": next_parent_ids
        }
        result
    input:
      - level_items
      - all_item_ids
      - all_fetched_items
      - current_parent_ids
    output:
      - current_query
      - all_item_ids
      - all_fetched_items
      - has_more_levels
      - current_parent_ids
    structured_output: true
    transition: CheckMoreRouter
  - id: CheckMoreRouter
    type: router
    condition: |
      {% if has_more_levels %}
        FetchLevel
      {% else %}
        CleanHierarchyData
      {% endif %}
    default_output: CleanHierarchyData
    input:
      - has_more_levels
    routes:
      - FetchLevel
      - CleanHierarchyData
  - id: CleanHierarchyData
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        import html as _html

        epic_data = alita_state.get('epic_data', {})
        epic_id = alita_state.get('epic_id')
        all_fetched_items = alita_state.get('all_fetched_items', [])

        # Extract nested if needed
        if isinstance(all_fetched_items, dict) and 'all_fetched_items' in all_fetched_items:
            all_fetched_items = all_fetched_items['all_fetched_items']

        def strip_html(text):
            """Strip HTML tags and normalise whitespace from a description field."""
            if not text:
                return ''
            text = _html.unescape(text)          # &amp; → &, &nbsp; → space, etc.
            text = re.sub(r'<[^>]+>', ' ', text) # remove every HTML tag
            text = re.sub(r'[ \t]+', ' ', text)  # collapse horizontal whitespace
            text = re.sub(r'\n{3,}', '\n\n', text)  # collapse excess blank lines
            return text.strip()

        # Initialize hierarchy with the epic (including description)
        hierarchy = {
            'epic': {
                'id': epic_id,
                'title': epic_data.get('System.Title', 'Untitled'),
                'state': epic_data.get('System.State', 'Unknown'),
                'type': epic_data.get('System.WorkItemType', 'Epic'),
                'url': epic_data.get('url', ''),
                'description': strip_html(epic_data.get('System.Description', '')),
                'parent_id': None,
                'children_ids': [],
                'level': 0
            },
            'items': {},
            'metadata': {
                'total_items': 0,
                'max_level': 0
            }
        }

        # Build items dictionary with clean data
        # Create a parent mapping from query inference
        parent_map = {}  # Maps child_id to parent_id based on query results

        for item in all_fetched_items:
            item_id = item.get('id') or item.get('System.Id')
            parent_id = item.get('System.Parent')
            # If System.Parent exists in response, use it
            if parent_id:
                parent_map[item_id] = parent_id
            # Otherwise check if we inferred it from query
            elif '_inferred_parent_from_query' in item:
                inferred_parents = item['_inferred_parent_from_query']
                # For now, when multiple parents possible, try to deduce from available data
                # The challenge: we queried "WHERE [System.Parent] IN (10,18)" but don't know which
                # Workaround: Assign parent sequentially (this is best-effort without System.Parent field)
                if len(inferred_parents) == 1:
                    parent_map[item_id] = inferred_parents[0]
                # If multiple parents, we need System.Parent field - fallback to first parent and mark for debug
                else:
                    parent_map[item_id] = inferred_parents[0]
                    item['_parent_ambiguous'] = True
            else:
                # No parent info at all, assume direct child of epic
                parent_map[item_id] = epic_id

        for item in all_fetched_items:
            item_id = item.get('id') or item.get('System.Id')
            # Convert to string for dict key
            item_id_str = str(item_id)
            # Use mapped parent or default to epic
            parent_id = parent_map.get(item_id, epic_id)
            # Store complete item data (all fields for readiness analysis, including description)
            clean_item = {
                'id': item_id,
                'title': item.get('System.Title', 'Untitled'),
                'state': item.get('System.State', 'Unknown'),
                'type': item.get('System.WorkItemType', 'Task'),
                'parent_id': parent_id,
                'children_ids': [],
                'level': 0,  # Will be calculated
                'description': strip_html(item.get('System.Description', '')),
                # Additional fields from search results
                'assigned_to': item.get('System.AssignedTo', 'N/A'),
                'reason': item.get('System.Reason', ''),
                'created_date': item.get('System.CreatedDate', ''),
                'changed_date': item.get('System.ChangedDate', ''),
                'work_item_type': item.get('System.WorkItemType', ''),
                'url': item.get('url', '')
            }
            hierarchy['items'][item_id_str] = clean_item

        # Calculate levels and populate children_ids
        # First pass: add all items to their parent's children list
        for item_id, item in hierarchy['items'].items():
            parent_id = item['parent_id']
            parent_id_str = str(parent_id)
            if parent_id == epic_id:
                # Direct child of epic
                if item['id'] not in hierarchy['epic']['children_ids']:
                    hierarchy['epic']['children_ids'].append(item['id'])
                item['level'] = 1
            elif parent_id_str in hierarchy['items']:
                # Child of another item (convert parent_id to string for lookup)
                parent_item = hierarchy['items'][parent_id_str]
                if item['id'] not in parent_item['children_ids']:
                    parent_item['children_ids'].append(item['id'])

        # Second pass: calculate levels for nested items
        max_iterations = 10  # Prevent infinite loops
        for iteration in range(max_iterations):
            updated = False
            for item_id, item in hierarchy['items'].items():
                if item['level'] == 0:  # Not calculated yet
                    parent_id_str = str(item['parent_id'])
                    if parent_id_str in hierarchy['items'] and hierarchy['items'][parent_id_str]['level'] > 0:
                        parent_level = hierarchy['items'][parent_id_str]['level']
                        item['level'] = parent_level + 1
                        updated = True
            if not updated:
                break

        # Calculate metadata
        hierarchy['metadata']['total_items'] = len(hierarchy['items'])
        max_level = max([item['level'] for item in hierarchy['items'].values()], default=0)
        hierarchy['metadata']['max_level'] = max_level

        result = {"hierarchy_data": hierarchy}
        result
    input:
      - epic_data
      - epic_id
      - all_fetched_items
    output:
      - hierarchy_data
    structured_output: false
    transition: CalculateReadiness
  - id: CalculateReadiness
    type: code
    code:
      type: fixed
      value: |-
        hierarchy_data = alita_state.get('hierarchy_data', {})

        # Extract nested if needed
        if isinstance(hierarchy_data, dict) and 'hierarchy_data' in hierarchy_data:
            hierarchy_data = hierarchy_data['hierarchy_data']

        epic = hierarchy_data.get('epic', {})
        items = hierarchy_data.get('items', {})

        # Define completed states (case-insensitive)
        completed_states = {'done', 'closed', 'completed', 'resolved'}

        # Count total and completed items (including epic)
        total_items = len(items) + 1  # +1 for epic itself
        completed_items = 0

        # Check if epic is completed
        epic_state = epic.get('state', '').lower()
        epic_is_done = epic_state in completed_states
        if epic_is_done:
            completed_items += 1

        # Collect blockers (non-completed items)
        blockers = []

        # Break down by type
        by_type = {}

        for item_id, item in items.items():
            state = item.get('state', '').lower()
            work_type = item.get('type', 'Unknown')
            # Count by type
            if work_type not in by_type:
                by_type[work_type] = {'total': 0, 'completed': 0}
            by_type[work_type]['total'] += 1
            # Check if completed
            if state in completed_states:
                completed_items += 1
                by_type[work_type]['completed'] += 1
            else:
                # Add to blockers
                blockers.append({
                    'id': item.get('id'),
                    'title': item.get('title', 'Untitled'),
                    'type': work_type,
                    'state': item.get('state', 'Unknown'),
                    'assigned_to': item.get('assigned_to', 'N/A'),
                    'url': item.get('url', '')
                })

        # Calculate completion percentage
        completion_percentage = (completed_items / total_items * 100) if total_items > 0 else 0

        # Determine readiness status based on rules
        if completion_percentage >= 95 and epic_is_done:
            readiness_status = 'COMPLETE'
            status_reason = 'completion ≥ 95% and epic completed'
        elif completion_percentage >= 90:
            readiness_status = 'READY'
            status_reason = 'completion ≥ 90%'
        elif completion_percentage >= 50:
            readiness_status = 'IN_PROGRESS'
            status_reason = '50% ≤ completion < 90%'
        else:
            readiness_status = 'AT_RISK'
            status_reason = 'completion < 50%'

        # Generate breakdown by type
        type_breakdown = []
        for work_type, counts in by_type.items():
            type_pct = (counts['completed'] / counts['total'] * 100) if counts['total'] > 0 else 0
            type_breakdown.append({
                'type': work_type,
                'total': counts['total'],
                'completed': counts['completed'],
                'percentage': round(type_pct, 1)
            })

        # Build formatted markdown report
        report_lines = []
        report_lines.append(f"# Readiness report for Epic {epic.get('id')}:\n")
        report_lines.append("## Epic summary")
        report_lines.append(f"Epic ID: {epic.get('id')}")
        report_lines.append(f"Title: {epic.get('title')}")
        report_lines.append(f"State: {epic.get('state')}")
        report_lines.append(f"URL: {epic.get('url')}\n")

        report_lines.append("## Readiness status")
        report_lines.append(f"Total work items (including epic): {total_items}")
        report_lines.append(f"Completed items: {completed_items}")
        report_lines.append(f"Completion: {round(completion_percentage, 1)}% ({completed_items} / {total_items})")
        report_lines.append(f"Overall status: {readiness_status} ({status_reason})\n")

        # Add blockers section
        if blockers:
            report_lines.append(f"## Blockers (non-completed items — {len(blockers)} item(s))")
            for blocker in blockers:
                report_lines.append(f"ID {blocker['id']} — {blocker['type']}: {blocker['title']}")
                report_lines.append(f"State: {blocker['state']}")
                report_lines.append(f"Assigned to: {blocker['assigned_to']}")
                report_lines.append(f"URL: {blocker['url']}")
        else:
            report_lines.append("## Blockers")
            report_lines.append("No blockers — all items completed!")

        formatted_report = "\n".join(report_lines)

        # Build structured readiness report
        readiness_report = {
            'readiness_status': readiness_status,
            'status_reason': status_reason,
            'epic_id': epic.get('id'),
            'epic_title': epic.get('title'),
            'epic_state': epic.get('state'),
            'summary': {
                'total_items': total_items,
                'completed_items': completed_items,
                'pending_items': total_items - completed_items,
                'completion_percentage': round(completion_percentage, 1)
            },
            'breakdown_by_type': type_breakdown,
            'blockers': blockers,
            'max_hierarchy_level': hierarchy_data.get('metadata', {}).get('max_level', 0),
            'formatted_report': formatted_report
        }

        # Add report to hierarchy data
        hierarchy_data['readiness'] = readiness_report

        {
            'hierarchy_data': hierarchy_data,
            'readiness_report': readiness_report
        }
    input:
      - hierarchy_data
    output:
      - hierarchy_data
      - readiness_report
    structured_output: true
    transition: BuildHierarchyMarkdown
  - id: BuildHierarchyMarkdown
    type: code
    code:
      type: fixed
      value: |-
        hierarchy_data = alita_state.get('hierarchy_data', {})

        # Extract nested if needed
        if isinstance(hierarchy_data, dict) and 'hierarchy_data' in hierarchy_data:
            hierarchy_data = hierarchy_data['hierarchy_data']

        epic = hierarchy_data.get('epic', {})
        items = hierarchy_data.get('items', {})

        # Define status icons based on state
        def get_status_icon(state):
            state_lower = state.lower()
            if state_lower in {'done', 'closed', 'completed', 'resolved'}:
                return '✅'
            elif state_lower in {'in progress', 'active', 'doing'}:
                return '⚠️'
            else:
                return '❌'

        # Build tree structure recursively
        def build_tree(item_id, prefix='', is_last=True):
            lines = []
            # Get item data
            if item_id == epic.get('id'):
                item = epic
                is_epic = True
            else:
                item = items.get(str(item_id), {})
                is_epic = False
            # Format current item
            title = item.get('title', 'Untitled')
            state = item.get('state', 'Unknown')
            item_type = item.get('type', 'Item')
            status_icon = get_status_icon(state)
            if is_epic:
                lines.append(f"{item_type}: {title}")
            else:
                connector = '└── ' if is_last else '├── '
                lines.append(f"{prefix}{connector}{item_type}: {title} (ID {item_id}) {status_icon} {state}")
            # Get children
            children_ids = item.get('children_ids', [])
            if children_ids:
                for idx, child_id in enumerate(children_ids):
                    is_last_child = (idx == len(children_ids) - 1)
                    if is_epic:
                        child_prefix = ''
                    else:
                        extension = '    ' if is_last else '│   '
                        child_prefix = prefix + extension
                    lines.extend(build_tree(child_id, child_prefix, is_last_child))
            return lines

        # Build the hierarchy markdown
        md_lines = []
        md_lines.append("# Work item hierarchy\n")
        md_lines.extend(build_tree(epic.get('id')))
        md_lines.append("\n(Status icons: ✅ Done/Closed/Completed — ⚠️ In Progress/Active — ❌ To Do/New/other)")

        hierarchy_markdown = "\n".join(md_lines)

        {
            'hierarchy_markdown': hierarchy_markdown
        }
    input:
      - hierarchy_data
    output:
      - hierarchy_markdown
    structured_output: true
    transition: RouteSaving
  - id: RouteSaving
    type: router
    condition: '{% if artifact_filepath %}SaveHierarchyData{% endif %}'
    default_output: SetDefaults
    input:
      - artifact_filepath
    routes:
      - SaveHierarchyData
      - SetDefaults
  - id: SetDefaults
    type: code
    code:
      type: fixed
      value: |-
        epic_id = alita_state.get('epic_id', 0)
        output_name = alita_state.get('output_name', 'unknown')
        
        # New naming pattern: {id}_feature_{output_name}.json
        filename = f"{epic_id}_feature_{output_name}.json"

        {
            "artifact_filepath": filename
        }
    input:
      - epic_id
      - output_name
    output:
      - artifact_filepath
    structured_output: true
    transition: SaveHierarchyData
  - id: SaveHierarchyData
    type: toolkit
    input:
      - hierarchy_data
      - artifact_filepath
    input_mapping:
      bucket_name:
        type: fixed
        value: null
      filedata:
        type: fstring
        value: '{hierarchy_data}'
      filename:
        type: variable
        value: artifact_filepath
      filepath:
        type: fixed
        value: null
    output: []
    structured_output: true
    tool: createFile
    toolkit_name: epic_artifacts
    transition: PrepareMarkdownFilename
  - id: PrepareMarkdownFilename
    type: code
    code:
      type: fixed
      value: |-
        artifact_filepath = alita_state.get('artifact_filepath', '')

        # artifact_filepath should always be set at this point (from SetDefaults or user input)
        # Simply convert .json to .md
        if artifact_filepath and artifact_filepath.strip():
            if artifact_filepath.endswith('.json'):
                md_filepath = artifact_filepath[:-5] + '.md'
            else:
                md_filepath = artifact_filepath + '.md'
        else:
            # Fallback: should not happen, but handle gracefully
            md_filepath = 'hierarchy.md'

        {'md_filepath': md_filepath}
    input:
      - artifact_filepath
    output:
      - md_filepath
    structured_output: true
    transition: SaveHierarchyMarkdown
  - id: SaveHierarchyMarkdown
    type: toolkit
    input:
      - hierarchy_markdown
      - md_filepath
    input_mapping:
      bucket_name:
        type: fixed
        value: null
      filedata:
        type: variable
        value: hierarchy_markdown
      filename:
        type: variable
        value: md_filepath
      filepath:
        type: fixed
        value: null
    output: []
    structured_output: true
    tool: createFile
    toolkit_name: epic_artifacts
    transition: FormatSuccessResult
  - id: FormatSuccessResult
    type: code
    code:
      type: fixed
      value: |-
        epic_id = alita_state.get('epic_id')
        hierarchy_data = alita_state.get('hierarchy_data', {})
        output_expand = alita_state.get('output_expand', True)
        processed_results = alita_state.get('processed_results', [])
        
        # Extract nested if needed
        if isinstance(processed_results, dict) and 'processed_results' in processed_results:
            processed_results = processed_results['processed_results']
        if isinstance(hierarchy_data, dict) and 'hierarchy_data' in hierarchy_data:
            hierarchy_data = hierarchy_data['hierarchy_data']
        
        # Build list of IDs for this epic
        if output_expand:
            # Include parent ID with _feature suffix + all descendant IDs
            result_ids = [f"{epic_id}_feature"]
            items = hierarchy_data.get('items', {})
            # Add all item IDs (descendants) without suffix
            for item_id_str in items.keys():
                result_ids.append(int(item_id_str))
        else:
            # Only the input ID with _feature suffix
            result_ids = [f"{epic_id}_feature"]
        
        # Add this epic's ID list to processed results
        processed_results.append(result_ids)
        
        {
            "processed_results": processed_results
        }
    input:
      - epic_id
      - hierarchy_data
      - output_expand
      - processed_results
    output:
      - processed_results
    structured_output: true
    transition: IncrementEpicIndex
  - id: IncrementEpicIndex
    type: code
    code:
      type: fixed
      value: |-
        current_epic_index = alita_state.get('current_epic_index', 0)
        
        # Extract nested if needed
        if isinstance(current_epic_index, dict) and 'current_epic_index' in current_epic_index:
            current_epic_index = current_epic_index['current_epic_index']
        
        # Increment index for next epic
        next_index = current_epic_index + 1
        
        {
            "current_epic_index": next_index
        }
    input:
      - current_epic_index
    output:
      - current_epic_index
    structured_output: true
    transition: SetCurrentEpicId
  - id: CompileResults
    type: code
    code:
      type: fixed
      value: |-
        import json
        
        processed_results = alita_state.get('processed_results', [])
        
        # Extract nested if needed
        if isinstance(processed_results, dict) and 'processed_results' in processed_results:
            processed_results = processed_results['processed_results']
        
        if not processed_results:
            # No results - this means validation failed
            operation_result = '{"operation": "fetch_hierarchy", "status": "error", "error": "No results processed"}'
        else:
            # Return list of lists format: [[id1, ...], [id2, ...], ...]
            operation_result = json.dumps(processed_results)
        
        {
            "operation_result": operation_result
        }
    input:
      - processed_results
    output:
      - operation_result
    structured_output: true
    transition: ReplyComposer
  - id: ReplyComposer
    type: llm
    input:
      - operation_result
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: |-
          You are a communication specialist tasked to formulate final output to user based on performed activity.

          * Be friendly and professional
          * Formulate final output clearly
          * For successful operations: 
            - Display the result as a JSON list of lists
            - Each inner list represents one input ID and its descendants (if expanded)
            - Format: [[id1, descendants...], [id2, descendants...], ...]
          * For errors: Provide clear explanation and suggest correct input format
          * Don't suggest further operations unless it's error recovery guidance
      task:
        type: fstring
        value: |-
          Operation result:
          {operation_result}

          If this is a successful operation, display the result as JSON list of lists.
          If this is an error, explain the issue and provide the correct input format: {{"ids": [9, 42], "output_expand": true, "output_name": "optional"}}.
    output: []
    structured_output: false
    transition: END
