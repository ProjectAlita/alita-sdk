state:
  ac_coverage_map:
    type: dict
    value: {}
  artifact_filepath:
    type: string
    value: ''
  enriched_hierarchy_data:
    type: dict
    value: {}
  enriched_json_str:
    type: string
    value: ''
  epic_description:
    type: string
    value: ''
  epic_id:
    type: int
    value: 0
  error_message:
    type: string
    value: ''
  expand:
    type: bool
    value: true
  extracted_acs:
    type: dict
    value: {}
  hierarchy_data:
    type: dict
    value: {}
  hierarchy_filename:
    type: string
    value: ''
  hierarchy_json:
    type: string
    value: ''
  hierarchy_structure:
    type: string
    value: ''
  input:
    type: string
  items_description:
    type: string
    value: ''
  operation_result:
    type: string
    value: ''
  output_name:
    type: string
    value: ''
  result_filename:
    type: list
    value: []
  validation_passed:
    type: bool
    value: false
entry_point: ParseInput
nodes:
  - id: ParseInput
    type: code
    code:
      type: fixed
      value: |-
        import json

        input_str = alita_state.get('input', '')

        # Handle if input is already a dict (pre-parsed)
        if isinstance(input_str, dict):
            input_data = input_str
            # Skip to validation
            expand = input_data.get('expand', True)
            output_name = input_data.get('output_name', '')
            
            if 'id' not in input_data:
                result = {
                    "validation_passed": False,
                    "error_message": "Missing required field 'id'. Expected: {\"id\": 9, \"expand\": true}",
                    "epic_id": 0,
                    "expand": True,
                    "output_name": ""
                }
            else:
                try:
                    epic_id = int(input_data['id'])
                    if epic_id <= 0:
                        result = {
                            "validation_passed": False,
                            "error_message": f"Invalid work item ID: {input_data['id']}. ID must be a positive integer.",
                            "epic_id": 0,
                            "expand": expand,
                            "output_name": output_name
                        }
                    else:
                        # Generate output_name if not provided
                        import random
                        import string
                        
                        if not output_name or not output_name.strip():
                            output_name = ''.join(random.choices(string.ascii_lowercase + string.digits, k=8))
                        
                        result = {
                            "validation_passed": True,
                            "error_message": "",
                            "epic_id": epic_id,
                            "expand": expand,
                            "output_name": output_name
                        }
                except (ValueError, TypeError):
                    result = {
                        "validation_passed": False,
                        "error_message": f"Invalid work item ID: {input_data['id']}. ID must be a positive integer.",
                        "epic_id": 0,
                        "expand": expand,
                        "output_name": output_name
                    }
        else:
            # Input is a string, parse as JSON
            input_str = str(input_str).strip()
            
            # Step 1: Check if input is provided
            if not input_str:
                result = {
                    "validation_passed": False,
                    "error_message": "Input is required. Please provide JSON: {\"id\": 9, \"expand\": true}",
                    "epic_id": 0,
                    "expand": True,
                    "output_name": ""
                }
            else:
                # Step 2: Try to parse JSON
                try:
                    input_data = json.loads(input_str)
                except json.JSONDecodeError:
                    result = {
                        "validation_passed": False,
                        "error_message": f"Input is not parsable json. Expected format: {{\"id\": 9, \"expand\": true, \"output_name\": \"optional\"}}\nReceived input: \"{input_str}\"",
                        "epic_id": 0,
                        "expand": True,
                        "output_name": ""
                    }
                else:
                    # Step 3: Validate JSON structure and types
                    if not isinstance(input_data, dict):
                        result = {
                            "validation_passed": False,
                            "error_message": "Input must be a JSON object. Expected: {\"id\": 9, \"expand\": true}",
                            "epic_id": 0,
                            "expand": True,
                            "output_name": ""
                        }
                    elif 'id' not in input_data:
                        result = {
                            "validation_passed": False,
                            "error_message": "Missing required field 'id'. Expected: {\"id\": 9, \"expand\": true}",
                            "epic_id": 0,
                            "expand": input_data.get('expand', True),
                            "output_name": input_data.get('output_name', '')
                        }
                    else:
                        # Step 4: Validate expand and output_name types if provided
                        expand = input_data.get('expand', True)
                        output_name = input_data.get('output_name', '')
                        
                        if 'expand' in input_data and not isinstance(expand, bool):
                            result = {
                                "validation_passed": False,
                                "error_message": "Field 'expand' must be a boolean (true or false). Expected: {\"id\": 9, \"expand\": true}",
                                "epic_id": 0,
                                "expand": True,
                                "output_name": ""
                            }
                        elif 'output_name' in input_data and not isinstance(output_name, str):
                            result = {
                                "validation_passed": False,
                                "error_message": "Field 'output_name' must be a string. Expected: {\"id\": 9, \"expand\": true, \"output_name\": \"my_run\"}",
                                "epic_id": 0,
                                "expand": True,
                                "output_name": ""
                            }
                        else:
                            # Step 5: Validate ID value
                            try:
                                epic_id = int(input_data['id'])
                                if epic_id <= 0:
                                    result = {
                                        "validation_passed": False,
                                        "error_message": f"Invalid work item ID: {input_data['id']}. ID must be a positive integer.",
                                        "epic_id": 0,
                                        "expand": expand,
                                        "output_name": output_name
                                    }
                                else:
                                    # All validations passed - generate output_name if not provided
                                    import random
                                    import string
                                    
                                    if not output_name or not output_name.strip():
                                        output_name = ''.join(random.choices(string.ascii_lowercase + string.digits, k=8))
                                    
                                    result = {
                                        "validation_passed": True,
                                        "error_message": "",
                                        "epic_id": epic_id,
                                        "expand": expand,
                                        "output_name": output_name
                                    }
                            except (ValueError, TypeError):
                                result = {
                                    "validation_passed": False,
                                    "error_message": f"Invalid work item ID: {input_data['id']}. ID must be a positive integer.",
                                    "epic_id": 0,
                                    "expand": expand,
                                    "output_name": output_name
                                }

        result
    input:
      - input
    output:
      - validation_passed
      - error_message
      - epic_id
      - expand
      - output_name
    structured_output: true
    transition: ValidationRouter
  - id: ValidationRouter
    type: router
    condition: |
      {% if validation_passed %}
        SetDefaults
      {% else %}
        FormatErrorResult
      {% endif %}
    default_output: FormatErrorResult
    input:
      - validation_passed
    routes:
      - SetDefaults
      - FormatErrorResult
  - id: SetDefaults
    type: code
    code:
      type: fixed
      value: |-
        epic_id = alita_state.get('epic_id')
        output_name = alita_state.get('output_name', '')

        # Generate filename pattern: {id}_acs_{output_name}.json
        if output_name:
            artifact_filepath = f"{epic_id}_acs_{output_name}.json"
        else:
            artifact_filepath = f"{epic_id}_acs.json"

        {'artifact_filepath': artifact_filepath}
    input:
      - epic_id
      - output_name
    output:
      - artifact_filepath
    structured_output: true
    transition: CallHierarchyFetcher
  - id: CallHierarchyFetcher
    type: agent
    input:
      - epic_id
      - expand
      - output_name
    input_mapping:
      chat_history:
        type: fixed
        value: []
      task:
        type: fstring
        value: '{"id": {epic_id}, "expand": {expand}, "output_name": "{output_name}"}'
    output:
      - operation_result
    output_mapping:
      operation_result:
        type: variable
        value: operation_result
    structured_output: true
    tool: ADO_Item_Hierarchy_Fetcher
    transition: LoadHierarchyFromFetcher
  - id: LoadHierarchyFromFetcher
    type: code
    code:
      type: fixed
      value: |-
        import json

        # Get operation_result from input parameter
        operation_result = alita_state.get('operation_result', '')

        # Parse the operation_result to get the filename list
        result_filename = []
        parse_error = None
        
        try:
            if isinstance(operation_result, str):
                # Try to parse as JSON
                parsed = json.loads(operation_result)
                # Check if it's an error response
                if isinstance(parsed, dict) and 'error' in parsed:
                    parse_error = f"Hierarchy fetcher returned error: {parsed.get('error', 'Unknown error')}"
                elif isinstance(parsed, list):
                    result_filename = parsed
                else:
                    parse_error = f"Unexpected response format: {type(parsed).__name__}"
            elif isinstance(operation_result, list):
                result_filename = operation_result
            elif isinstance(operation_result, dict):
                # Check if it's an error response
                if 'error' in operation_result:
                    parse_error = f"Hierarchy fetcher returned error: {operation_result.get('error', 'Unknown error')}"
                else:
                    parse_error = f"Unexpected dict response (expected list): {operation_result}"
            else:
                parse_error = f"Invalid response type: {type(operation_result).__name__}"
        except json.JSONDecodeError as e:
            parse_error = f"Failed to parse JSON response: {str(e)}"
        except Exception as e:
            parse_error = f"Unexpected error parsing response: {str(e)}"

        # Validate we got a filename
        if parse_error:
            validation_passed = False
            error_message = parse_error
            hierarchy_filename = ""
        elif not result_filename or not isinstance(result_filename, list) or len(result_filename) == 0:
            validation_passed = False
            error_message = f"Hierarchy fetcher did not return a valid filename. Received: {operation_result}"
            hierarchy_filename = ""
        else:
            # Get first filename from list
            hierarchy_filename = result_filename[0]
            validation_passed = True
            error_message = ""

        {
            'validation_passed': validation_passed,
            'hierarchy_filename': hierarchy_filename,
            'error_message': error_message
        }
    input:
      - operation_result
    output:
      - validation_passed
      - hierarchy_filename
      - error_message
    structured_output: true
    transition: HierarchyLoadRouter
  - id: HierarchyLoadRouter
    type: router
    condition: |
      {% if validation_passed %}
        LoadHierarchyFile
      {% else %}
        FormatErrorResult
      {% endif %}
    default_output: FormatErrorResult
    input:
      - validation_passed
    routes:
      - LoadHierarchyFile
      - FormatErrorResult
  - id: LoadHierarchyFile
    type: toolkit
    input:
      - hierarchy_filename
    input_mapping:
      bucket_name:
        type: fixed
        value: null
      filename:
        type: variable
        value: hierarchy_filename
      filepath:
        type: fixed
        value: null
    output:
      - hierarchy_data
    structured_output: true
    tool: readFile
    toolkit_name: epic_artifacts
    transition: ParseHierarchyData
  - id: ParseHierarchyData
    type: code
    code:
      type: fixed
      value: |-
        import json
        import ast

        hierarchy_data = alita_state.get('hierarchy_data', '{}')
        
        # Debug logging
        data_type = type(hierarchy_data).__name__
        data_preview = str(hierarchy_data)[:200] if hierarchy_data else 'None'
        
        # Advanced debugging: check for control characters
        if isinstance(hierarchy_data, str):
            # Check first 500 chars for any actual control characters (not escape sequences)
            sample = hierarchy_data[:500]
            control_chars_found = []
            for i, char in enumerate(sample):
                if ord(char) < 32 and char not in ('\n', '\r', '\t'):
                    control_chars_found.append(f"pos {i}: 0x{ord(char):02x}")
            
            # Also check for literal newlines in suspicious positions (inside JSON strings)
            # Count quotes to detect if we're inside a string value
            in_string = False
            newline_positions = []
            for i, char in enumerate(sample):
                if char == '"' and (i == 0 or sample[i-1] != '\\'):
                    in_string = not in_string
                if char == '\n' and in_string:
                    newline_positions.append(i)
            
            debug_info = f"Control chars: {control_chars_found if control_chars_found else 'none'}. Newlines in strings at positions: {newline_positions if newline_positions else 'none'}"
        else:
            debug_info = "Not a string"
        
        validation_passed = True
        error_message = ''

        # Handle nested structures from toolkit response
        if isinstance(hierarchy_data, dict):
            # Check for 'result' wrapper first (common toolkit response format)
            if 'result' in hierarchy_data:
                hierarchy_data = hierarchy_data['result']
            # Check if it's wrapped in another dict
            if isinstance(hierarchy_data, dict) and 'hierarchy_data' in hierarchy_data:
                hierarchy_data = hierarchy_data['hierarchy_data']
            # Check if the dict contains a string value that needs parsing
            elif isinstance(hierarchy_data, dict) and len(hierarchy_data) == 1 and isinstance(list(hierarchy_data.values())[0], str):
                # Might be wrapped like {'data': '{"epic": {...}}'} 
                hierarchy_data = list(hierarchy_data.values())[0]

        # Parse string to dict if needed
        if isinstance(hierarchy_data, str):
            # Try JSON first
            try:
                hierarchy_data = json.loads(hierarchy_data)
            except json.JSONDecodeError as e:
                # Fallback: try Python literal eval (handles {'key': 'value'} format)
                try:
                    hierarchy_data = ast.literal_eval(hierarchy_data)
                except (ValueError, SyntaxError) as e2:
                    # Both parsers failed
                    validation_passed = False
                    error_message = f"Failed to parse hierarchy data. JSON error: {str(e)}. Python literal_eval error: {str(e2)}. Data type: {data_type}, Preview: {data_preview}"
                    hierarchy_data = {'epic': {}, 'items': {}, 'metadata': {}}
        
        # Ensure we have a valid dict with expected structure (only if no error yet)
        if validation_passed and not isinstance(hierarchy_data, dict):
            validation_passed = False
            error_message = f"Hierarchy data is not a dict after parsing. Type: {type(hierarchy_data).__name__}, Preview: {str(hierarchy_data)[:200]}"
            hierarchy_data = {'epic': {}, 'items': {}, 'metadata': {}}
        
        if validation_passed and 'epic' not in hierarchy_data:
            validation_passed = False
            error_message = f"Hierarchy data missing 'epic' key. Keys present: {list(hierarchy_data.keys())}, Original data type: {data_type}"
            hierarchy_data = {'epic': {}, 'items': {}, 'metadata': {}}
        
        # Build result dict
        {
            'validation_passed': validation_passed,
            'error_message': error_message,
            'hierarchy_data': hierarchy_data
        }
    input:
      - hierarchy_data
    output:
      - validation_passed
      - error_message
      - hierarchy_data
    structured_output: true
    transition: ParseHierarchyRouter
  - id: ParseHierarchyRouter
    type: router
    condition: |
      {% if validation_passed %}
        PrepareACExtraction
      {% else %}
        FormatErrorResult
      {% endif %}
    default_output: FormatErrorResult
    input:
      - validation_passed
      - hierarchy_data
    routes:
      - PrepareACExtraction
      - FormatErrorResult
  - id: PrepareACExtraction
    type: code
    code:
      type: fixed
      value: |-
        import json
        
        hierarchy_data = alita_state.get('hierarchy_data', {})
        
        # Extract epic info for template
        epic = hierarchy_data.get('epic', {})
        epic_id = epic.get('id', 0)
        epic_description = epic.get('description', '')
        
        # Build items description for template
        items = hierarchy_data.get('items', {})
        items_text = []
        for item_id, item in items.items():
            item_type = item.get('type', 'Task')
            item_title = item.get('title', 'Untitled')
            item_desc = item.get('description', '')
            items_text.append(f"- Item ID {item_id} ({item_type}): {item_title}\n  Description: {item_desc}")
        
        items_description = '\n'.join(items_text) if items_text else 'No child items found.'
        
        # Also pass through the full hierarchy_data for next nodes
        hierarchy_json = json.dumps(hierarchy_data)
        
        {
            'epic_id': epic_id,
            'epic_description': epic_description,
            'items_description': items_description,
            'hierarchy_json': hierarchy_json,
            'hierarchy_data': hierarchy_data
        }
    input:
      - hierarchy_data
    output:
      - epic_id
      - epic_description
      - items_description
      - hierarchy_json
      - hierarchy_data
    structured_output: true
    transition: ExtractAcceptanceCriteria
  - id: ExtractAcceptanceCriteria
    type: llm
    input:
      - epic_id
      - epic_description
      - items_description
      - hierarchy_json
      - hierarchy_data
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: |
          You are an acceptance criteria extraction specialist. Extract ACs from work item descriptions.

          **Recognition Patterns:**
          1. Labeled sections: "Acceptance Criteria", "AC", "ACs", "Definition of Done", "DoD" (case-insensitive)
          2. Numbered/bulleted lists under AC headers: `1.`, `-`, `*`
          3. Markdown checkboxes: `- [ ]` (not done), `- [x]` (done)
          4. Gherkin scenarios: `Given...When...Then` (each scenario = one AC)

          **Status Determination:**
          - `[x]` → "done"
          - `[ ]` → "not_done"
          - No checkbox → infer from context or return "unknown"

          **Output Format:**
          For each item with ACs, return structured JSON mapping item_id to AC list.
          Each AC must have: text (string), status (done|not_done|unknown), source (checkbox|labeled_section|gherkin|numbered_list)

          **Rules:**
          - Skip items with empty/no descriptions
          - Each AC should be discrete and testable
          - Preserve original AC text (don't paraphrase)
      task:
        type: fstring
        value: |
          Extract acceptance criteria from all work items in this hierarchy.

          Epic (ID {epic_id}):
          Description: {epic_description}

          Child Items:
          {items_description}

          Full hierarchy data (for reference):
          {hierarchy_json}

          Return JSON with this structure:
          {{
            "acs_by_item": {{
              "<item_id>": [
                {{"text": "...", "status": "done|not_done|unknown", "source": "checkbox|labeled_section|gherkin|numbered_list"}}
              ]
            }}
          }}

          Only include items that have ACs. Omit items with no ACs.
    output:
      - extracted_acs
    structured_output: true
    transition: PrepareCoverageMapping
  - id: PrepareCoverageMapping
    type: code
    code:
      type: fixed
      value: |-
        import json
        
        hierarchy_data = alita_state.get('hierarchy_data', {})
        extracted_acs = alita_state.get('extracted_acs', {})
        
        # Extract nested if needed
        if isinstance(extracted_acs, dict) and 'extracted_acs' in extracted_acs:
            extracted_acs = extracted_acs['extracted_acs']
        
        acs_by_item = extracted_acs.get('acs_by_item', {})
        
        # Build hierarchy structure text for template
        hierarchy_text = []
        items = hierarchy_data.get('items', {})
        
        if items:
            for item_id, item in items.items():
                children_ids = item.get('children_ids', [])
                if len(children_ids) > 0:
                    # This is a parent with children
                    item_type = item.get('type', 'Task')
                    item_title = item.get('title', 'Untitled')
                    hierarchy_text.append(f"\nParent ID {item_id} ({item_type}): {item_title}")
                    hierarchy_text.append("Parent ACs:")
                    
                    if item_id in acs_by_item:
                        for idx, ac in enumerate(acs_by_item[item_id], 1):
                            ac_text = ac.get('text', '')
                            ac_status = ac.get('status', 'unknown')
                            hierarchy_text.append(f"  AC-{idx}: {ac_text} [{ac_status}]")
                    else:
                        hierarchy_text.append("  (No ACs found)")
                    
                    hierarchy_text.append("\nChildren:")
                    for child_id in children_ids:
                        child = items.get(str(child_id), {})
                        child_title = child.get('title', 'Untitled')
                        child_desc = child.get('description', '')[:200]
                        child_ac_count = len(acs_by_item.get(str(child_id), []))
                        hierarchy_text.append(f"  - Child ID {child_id}: {child_title}")
                        hierarchy_text.append(f"    Child Description: {child_desc}...")
                        hierarchy_text.append(f"    Child ACs: {child_ac_count if child_ac_count > 0 else 'None'} found")
        else:
            hierarchy_text.append("No child items found in hierarchy.")
        
        hierarchy_structure = '\n'.join(hierarchy_text)
        
        {
            'hierarchy_structure': hierarchy_structure,
            'hierarchy_data': hierarchy_data,
            'extracted_acs': extracted_acs
        }
    input:
      - hierarchy_data
      - extracted_acs
    output:
      - hierarchy_structure
      - hierarchy_data
      - extracted_acs
    structured_output: true
    transition: MatchChildrenToParentACs
  - id: MatchChildrenToParentACs
    type: llm
    input:
      - hierarchy_structure
      - hierarchy_data
      - extracted_acs
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: |
          You are an AC coverage mapping specialist. Determine which parent ACs each child work item addresses.

          **Matching Rules:**
          1. **Direct parent only** - match child to its immediate parent's ACs (not grandparent or higher)
          2. **Explicit match** - child's description/ACs explicitly reference parent AC
          3. **Semantic match** - child's title/description semantically relates to parent AC (when child has no explicit ACs)
          4. **No forced matching** - if no confident match exists, return empty coverage

          **Confidence Levels:**
          - "explicit" - child description directly addresses parent AC
          - "semantic" - child title implies work toward parent AC (moderate confidence)
          - "none" - no match found

          **Output Format:**
          Map each child_id to covered parent AC indices with confidence and reasoning.
      task:
        type: fstring
        value: |
          Map child work items to parent ACs they cover.

          Hierarchy structure (children by parent):
          {hierarchy_structure}

          Return JSON:
          {{
            "coverage_map": {{
              "<child_id>": [
                {{
                  "parent_ac_index": 1,
                  "parent_id": "<parent_id>",
                  "confidence": "explicit|semantic|none",
                  "reason": "Brief explanation"
                }}
              ]
            }}
          }}

          Only include children that cover at least one parent AC. If no children or no coverage, return empty coverage_map.
    output:
      - ac_coverage_map
    structured_output: true
    transition: EnrichHierarchyWithACs
  - id: EnrichHierarchyWithACs
    type: code
    code:
      type: fixed
      value: |-
        import json

        hierarchy_data = alita_state.get('hierarchy_data', {})
        extracted_acs = alita_state.get('extracted_acs', {})
        ac_coverage_map = alita_state.get('ac_coverage_map', {})

        # Extract nested if needed
        if isinstance(hierarchy_data, dict) and 'hierarchy_data' in hierarchy_data:
            hierarchy_data = hierarchy_data['hierarchy_data']
        if isinstance(extracted_acs, dict) and 'extracted_acs' in extracted_acs:
            extracted_acs = extracted_acs['extracted_acs']
        if isinstance(ac_coverage_map, dict) and 'ac_coverage_map' in ac_coverage_map:
            ac_coverage_map = ac_coverage_map['ac_coverage_map']

        acs_by_item = extracted_acs.get('acs_by_item', {})
        coverage = ac_coverage_map.get('coverage_map', {})

        # Process Epic ACs
        epic_id = str(hierarchy_data['epic']['id'])
        if epic_id in acs_by_item:
            own_acs = []
            for idx, ac in enumerate(acs_by_item[epic_id], 1):
                ac_entry = {
                    'ac_id': f'{epic_id}-ac-{idx}',
                    'text': ac['text'],
                    'status': ac['status'],
                    'source': ac['source'],
                    'covered_by_children': []
                }
                own_acs.append(ac_entry)
            hierarchy_data['epic']['own_acs'] = own_acs
        else:
            hierarchy_data['epic']['own_acs'] = []

        # Process all items
        for item_id, item in hierarchy_data.get('items', {}).items():
            # Add own_acs (when item is a parent)
            if item_id in acs_by_item:
                own_acs = []
                for idx, ac in enumerate(acs_by_item[item_id], 1):
                    ac_entry = {
                        'ac_id': f'{item_id}-ac-{idx}',
                        'text': ac['text'],
                        'status': ac['status'],
                        'source': ac['source'],
                        'covered_by_children': []
                    }
                    own_acs.append(ac_entry)
                item['own_acs'] = own_acs
            else:
                item['own_acs'] = []
            
            # Add covered_parent_acs (when item is a child)
            if item_id in coverage:
                covered = []
                for mapping in coverage[item_id]:
                    covered.append({
                        'parent_ac_id': f"{mapping['parent_id']}-ac-{mapping['parent_ac_index']}",
                        'parent_id': mapping['parent_id'],
                        'parent_ac_index': mapping['parent_ac_index'],
                        'confidence': mapping['confidence'],
                        'reason': mapping['reason']
                    })
                item['covered_parent_acs'] = covered
            else:
                item['covered_parent_acs'] = []

        # Populate covered_by_children in parent ACs
        for item_id, item in hierarchy_data.get('items', {}).items():
            if 'covered_parent_acs' in item:
                for coverage_entry in item['covered_parent_acs']:
                    parent_id = str(coverage_entry['parent_id'])
                    parent_ac_idx = coverage_entry['parent_ac_index'] - 1  # Convert to 0-based
                    
                    # Find parent and update its AC
                    if parent_id == epic_id:
                        if parent_ac_idx < len(hierarchy_data['epic']['own_acs']):
                            hierarchy_data['epic']['own_acs'][parent_ac_idx]['covered_by_children'].append(int(item_id))
                    elif parent_id in hierarchy_data.get('items', {}):
                        if parent_ac_idx < len(hierarchy_data['items'][parent_id]['own_acs']):
                            hierarchy_data['items'][parent_id]['own_acs'][parent_ac_idx]['covered_by_children'].append(int(item_id))

        {'enriched_hierarchy_data': hierarchy_data}
    input:
      - hierarchy_data
      - extracted_acs
      - ac_coverage_map
    output:
      - enriched_hierarchy_data
    structured_output: true
    transition: SerializeEnrichedData
  - id: SerializeEnrichedData
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        
        enriched_hierarchy_data = alita_state.get('enriched_hierarchy_data', {})
        
        # Extract nested if needed
        if isinstance(enriched_hierarchy_data, dict) and 'enriched_hierarchy_data' in enriched_hierarchy_data:
            enriched_hierarchy_data = enriched_hierarchy_data['enriched_hierarchy_data']
        
        # Validate we have data
        if not enriched_hierarchy_data or not isinstance(enriched_hierarchy_data, dict):
            raise ValueError(f"No enriched hierarchy data to serialize!")
        
        # Sanitize all strings recursively to remove control characters
        def sanitize_strings(obj):
            """Recursively replace all control characters in strings with spaces."""
            if isinstance(obj, dict):
                return {k: sanitize_strings(v) for k, v in obj.items()}
            elif isinstance(obj, list):
                return [sanitize_strings(item) for item in obj]
            elif isinstance(obj, str):
                # Replace all control characters (0x00-0x1F, 0x7F) with space
                return re.sub(r'[\x00-\x1f\x7f]', ' ', obj)
            else:
                return obj
        
        # Sanitize all strings
        enriched_hierarchy_data = sanitize_strings(enriched_hierarchy_data)
        
        # Serialize with compact formatting
        enriched_json_str = json.dumps(enriched_hierarchy_data, ensure_ascii=True, separators=(',', ':'))
        
        # Verify we produced content
        if not enriched_json_str or len(enriched_json_str) < 10:
            raise ValueError(f"JSON serialization produced empty output!")
        
        {'enriched_json_str': enriched_json_str}
    input:
      - enriched_hierarchy_data
    output:
      - enriched_json_str
    structured_output: true
    transition: SaveEnrichedHierarchy
  - id: SaveEnrichedHierarchy
    type: toolkit
    input:
      - enriched_json_str
      - artifact_filepath
    input_mapping:
      bucket_name:
        type: fixed
        value: null
      filedata:
        type: variable
        value: enriched_json_str
      filename:
        type: variable
        value: artifact_filepath
      filepath:
        type: fixed
        value: null
    output: []
    structured_output: true
    tool: createFile
    toolkit_name: epic_artifacts
    transition: FormatSuccessResult
  - id: FormatSuccessResult
    type: code
    code:
      type: fixed
      value: |-
        artifact_filepath = alita_state.get('artifact_filepath', '')

        # Return filename in list format like ADO_Item_Hierarchy_Fetcher
        result_filename = [artifact_filepath]

        {'result_filename': result_filename}
    input:
      - artifact_filepath
    output:
      - result_filename
    structured_output: true
    transition: CompileResults
  - id: CompileResults
    type: code
    code:
      type: fixed
      value: |-
        result_filename = alita_state.get('result_filename', [])

        # Extract nested if needed
        if isinstance(result_filename, dict) and 'result_filename' in result_filename:
            result_filename = result_filename['result_filename']

        # Convert to JSON string for output
        import json
        operation_result = json.dumps(result_filename)

        {'operation_result': operation_result}
    input:
      - result_filename
    output:
      - operation_result
    structured_output: true
    transition: ReplyComposer
  - id: FormatErrorResult
    type: code
    code:
      type: fixed
      value: |-
        error_message = alita_state.get('error_message', 'Unknown error occurred')

        import json
        result = {
            'status': 'error',
            'error': error_message
        }
        operation_result = json.dumps(result)

        {'operation_result': operation_result}
    input:
      - error_message
    output:
      - operation_result
    structured_output: true
    transition: ReplyComposer
  - id: ReplyComposer
    type: llm
    input:
      - operation_result
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: |-
          You are a communication specialist. Format the operation result for the user.

          **For successful operations:**
          * Confirm epic was fetched and enriched with ACs
          * Display the filename list returned
          * Be concise and professional

          **For errors:**
          * Display error message clearly
          * Suggest next steps or corrections
      task:
        type: fstring
        value: |-
          Operation result:
          {operation_result}

          If this is a successful operation, display the filename list.
          If this is an error, explain the issue and provide the correct input format: {{"id": 9, "expand": true, "output_name": "optional"}}.
    output: []
    structured_output: false
    transition: END
