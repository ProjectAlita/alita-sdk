entry_point: PARSE_IT
nodes:
  - id: PARSE_IT
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re

        input_str = alita_state.get('input', '').strip()

        # Step 1: Check if input is provided
        if not input_str:
            result = {
                "validation_passed": False,
                "error_message": "Input is required. Please provide JSON: {\"id\": 9, \"include_dependencies\": true, \"include_links\": true}",
                "epic_id": 0,
                "max_depth": 100,
                "include_links": True,
                "output_name": ""
            }
        else:
            # Step 2: Try to parse JSON
            parse_failed = False
            try:
                input_data = json.loads(input_str)
            except json.JSONDecodeError:
                # Try to fix Python-style booleans (True/False) to JSON-style (true/false)
                fixed_input = re.sub(r':\s*True\b', ': true', input_str)
                fixed_input = re.sub(r':\s*False\b', ': false', fixed_input)
                try:
                    input_data = json.loads(fixed_input)
                except json.JSONDecodeError:
                    parse_failed = True
                    result = {
                        "validation_passed": False,
                        "error_message": f"Input is not parsable json. Expected format: {{\"id\": 9, \"include_dependencies\": true, \"include_links\": true, \"output_name\": \"optional\"}}\nReceived input: \"{input_str}\"",
                        "epic_id": 0,
                        "max_depth": 100,
                        "include_links": True,
                        "output_name": ""
                    }
            
            if not parse_failed:
                # Step 3: Validate JSON structure and types
                if not isinstance(input_data, dict):
                    result = {
                        "validation_passed": False,
                        "error_message": "Input must be a JSON object. Expected: {\"id\": 9, \"include_dependencies\": true, \"include_links\": true}",
                        "epic_id": 0,
                        "max_depth": 100,
                        "include_links": True,
                        "output_name": ""
                    }
                elif 'id' not in input_data:
                    # Transform include_dependencies to max_depth early for error cases
                    include_deps = input_data.get('include_dependencies', True)
                    if isinstance(include_deps, bool):
                        max_depth = 100 if include_deps else 0
                    elif isinstance(include_deps, int):
                        max_depth = max(0, include_deps)
                    else:
                        max_depth = 100
                    result = {
                        "validation_passed": False,
                        "error_message": "Missing required field 'id'. Expected: {\"id\": 9, \"include_dependencies\": true, \"include_links\": true}",
                        "epic_id": 0,
                        "max_depth": max_depth,
                        "include_links": input_data.get('include_links', True),
                        "output_name": input_data.get('output_name', '')
                    }
                else:
                    # Step 4: Validate include_dependencies, include_links, and output_name types if provided
                    include_deps = input_data.get('include_dependencies', True)
                    include_links = input_data.get('include_links', True)
                    output_name = input_data.get('output_name', '')
                    
                    # Transform include_dependencies to max_depth
                    if isinstance(include_deps, bool):
                        max_depth = 100 if include_deps else 0
                    elif isinstance(include_deps, int):
                        if include_deps < 0:
                            result = {
                                "validation_passed": False,
                                "error_message": "Field 'include_dependencies' must be >= 0 when using int. Use false for 0, true for unlimited, or positive int for specific depth.",
                                "epic_id": 0,
                                "max_depth": 100,
                                "include_links": True,
                                "output_name": ""
                            }
                            max_depth = None  # Mark as invalid
                        else:
                            max_depth = include_deps
                    else:
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'include_dependencies' must be a boolean or integer. Use false for no dependencies, true for all, or int for max depth.",
                            "epic_id": 0,
                            "max_depth": 100,
                            "include_links": True,
                            "output_name": ""
                        }
                        max_depth = None  # Mark as invalid
                    
                    # Validate include_links type
                    if max_depth is not None and 'include_links' in input_data and not isinstance(include_links, bool):
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'include_links' must be a boolean (true or false).",
                            "epic_id": 0,
                            "max_depth": max_depth,
                            "include_links": True,
                            "output_name": ""
                        }
                    elif max_depth is None:
                        pass  # Error already set above
                    elif 'output_name' in input_data and not isinstance(output_name, str):
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'output_name' must be a string. Expected: {\"id\": 9, \"include_dependencies\": true, \"include_links\": true, \"output_name\": \"my_run\"}",
                            "epic_id": 0,
                            "max_depth": max_depth,
                            "include_links": include_links,
                            "output_name": ""
                        }
                    else:
                        # Step 5: Validate ID value
                        try:
                            epic_id = int(input_data['id'])
                            if epic_id <= 0:
                                result = {
                                    "validation_passed": False,
                                    "error_message": f"Invalid work item ID: {input_data['id']}. ID must be a positive integer.",
                                    "epic_id": 0,
                                    "max_depth": max_depth,
                                    "include_links": include_links,
                                    "output_name": output_name
                                }
                            else:
                                # All validations passed
                                # Generate output_name if not provided: {id}_feature
                                # If provided by user: {id}_feature_{output_name}
                                if not output_name or not output_name.strip():
                                    output_name = f"{epic_id}_feature"
                                else:
                                    output_name = f"{epic_id}_feature_{output_name}"
                                
                                result = {
                                    "validation_passed": True,
                                    "error_message": "",
                                    "epic_id": epic_id,
                                    "max_depth": max_depth,
                                    "include_links": include_links,
                                    "output_name": output_name
                                }
                        except (ValueError, TypeError):
                            result = {
                                "validation_passed": False,
                                "error_message": f"Invalid work item ID: {input_data['id']}. ID must be a positive integer.",
                                "epic_id": 0,
                                "max_depth": max_depth if max_depth is not None else 100,
                                "include_links": include_links,
                                "output_name": output_name
                            }

        result
    input:
      - input
    output:
      - validation_passed
      - error_message
      - epic_id
      - max_depth
      - include_links
      - output_name
    structured_output: true
    transition: END
