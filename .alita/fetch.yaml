  - id: EnrichItemLinks
    type: code
    code:
      type: fixed
      value: |-
        import re
        
        hierarchy_data = alita_state.get('hierarchy_data', {})
        
        # Extract nested if needed
        if isinstance(hierarchy_data, dict) and 'hierarchy_data' in hierarchy_data:
            hierarchy_data = hierarchy_data['hierarchy_data']
        
        feature = hierarchy_data.get('feature', {})
        dependencies = hierarchy_data.get('dependencies', {})
        
        # Step 1: Collect all item-type links and extract unique item IDs
        item_link_ids = set()
        
        # Collect from feature
        if 'links' in feature:
            for link in feature['links']:
                if link.get('type') == 'item':
                    url = link.get('url', '')
                    # Extract ID from URL patterns:
                    # Pattern 1: workitem=123
                    match = re.search(r'workitem=(\d+)', url, re.IGNORECASE)
                    if match:
                        item_link_ids.add(int(match.group(1)))
                    else:
                        # Pattern 2: /_workitems/edit/123
                        match = re.search(r'/_workitems/edit/(\d+)', url, re.IGNORECASE)
                        if match:
                            item_link_ids.add(int(match.group(1)))
        
        # Collect from dependencies
        for dep_id, dep in dependencies.items():
            if 'links' in dep:
                for link in dep['links']:
                    if link.get('type') == 'item':
                        url = link.get('url', '')
                        match = re.search(r'workitem=(\d+)', url, re.IGNORECASE)
                        if match:
                            item_link_ids.add(int(match.group(1)))
                        else:
                            match = re.search(r'/_workitems/edit/(\d+)', url, re.IGNORECASE)
                            if match:
                                item_link_ids.add(int(match.group(1)))
        
        # Step 2: Build cache from already-fetched data
        item_cache = {}
        
        # Add feature to cache with integer key
        feature_id = feature.get('id')
        if feature_id:
            item_cache[int(feature_id)] = {
                'id': int(feature_id),
                'title': feature.get('title', 'Untitled'),
                'state': feature.get('state', 'Unknown'),
                'type': feature.get('type', 'Item'),
                'description': feature.get('description', ''),
                'url': feature.get('url', '')
            }
        
        # Add all dependencies to cache with integer keys
        for dep_id, dep in dependencies.items():
            dep_int_id = dep.get('id')
            if dep_int_id:
                item_cache[int(dep_int_id)] = {
                    'id': int(dep_int_id),
                    'title': dep.get('title', 'Untitled'),
                    'state': dep.get('state', 'Unknown'),
                    'type': dep.get('type', 'Item'),
                    'description': dep.get('description', ''),
                    'url': dep.get('url', '')
                }
        
        # Step 3: Identify missing item IDs (not in cache)
        missing_ids = [item_id for item_id in item_link_ids if item_id not in item_cache]
        
        {
            'hierarchy_data': hierarchy_data,
            'item_cache': item_cache,
            'missing_ids': missing_ids
        }
    input:
      - hierarchy_data
    output:
      - hierarchy_data
      - item_cache
      - missing_ids
    structured_output: true
    transition: CheckNeedFetchLinkedItems
  - id: CheckNeedFetchLinkedItems
    type: router
    condition: |
      {% if missing_ids and missing_ids|length > 0 %}
        FetchLinkedItems
      {% else %}
        UpdateItemLinkContent
      {% endif %}
    default_output: UpdateItemLinkContent
    input:
      - missing_ids
    routes:
      - FetchLinkedItems
      - UpdateItemLinkContent
  - id: FetchLinkedItems
    type: code
    code:
      type: fixed
      value: |-
        missing_ids = alita_state.get('missing_ids', [])
        item_cache = alita_state.get('item_cache', {})
        
        # Build WIQL query to fetch missing items
        if missing_ids:
            ids_str = ','.join(map(str, missing_ids))
            fetch_query = f"SELECT [System.Id], [System.Title], [System.State], [System.WorkItemType], [System.Description] FROM WorkItems WHERE [System.Id] IN ({ids_str})"
        else:
            fetch_query = ""
        
        {
            'fetch_query': fetch_query,
            'item_cache': item_cache
        }
    input:
      - missing_ids
      - item_cache
    output:
      - fetch_query
      - item_cache
    structured_output: true
    transition: ExecuteFetchLinkedItems
  - id: ExecuteFetchLinkedItems
    type: toolkit
    input:
      - fetch_query
    input_mapping:
      fields:
        type: fixed
        value:
          - System.Id
          - System.Title
          - System.State
          - System.WorkItemType
          - System.Description
      limit:
        type: fixed
        value: 200
      query:
        type: variable
        value: fetch_query
    on_error:
      transition: UpdateItemLinkContent
    output:
      - fetched_items
    structured_output: true
    tool: search_work_items
    toolkit_name: LFAADOBoardReader
    transition: MergeLinkedItems
  - id: MergeLinkedItems
    type: code
    code:
      type: fixed
      value: |-
        import re
        import html as _html
        
        item_cache = alita_state.get('item_cache', {})
        fetched_items = alita_state.get('fetched_items', [])
        
        # Extract nested if needed
        if isinstance(fetched_items, dict) and 'fetched_items' in fetched_items:
            fetched_items = fetched_items['fetched_items']
        
        # Handle string response or None
        if not isinstance(fetched_items, list):
            fetched_items = []
        
        def strip_html(text):
            """Strip HTML tags and normalise whitespace from a description field."""
            if not text:
                return ''
            text = _html.unescape(text)          # &amp; → &, &nbsp; → \xa0, etc.
            text = re.sub(r'<[^>]+>', ' ', text) # remove every HTML tag
            text = text.replace('\xa0', ' ')     # convert non-breaking spaces to regular spaces
            text = re.sub(r'[ \t]+', ' ', text)  # collapse horizontal whitespace
            text = re.sub(r'\n{3,}', '\n\n', text)  # collapse excess blank lines
            return text.strip()
        
        # Merge fetched items into cache
        for item in fetched_items:
            item_id = item.get('id') or item.get('System.Id')
            if item_id:
                # Ensure integer key
                item_cache[int(item_id)] = {
                    'id': int(item_id),
                    'title': item.get('System.Title', 'Untitled'),
                    'state': item.get('System.State', 'Unknown'),
                    'type': item.get('System.WorkItemType', 'Item'),
                    'description': strip_html(item.get('System.Description', '')),
                    'url': item.get('url', '')
                }
        
        {
            'item_cache': item_cache
        }
    input:
      - item_cache
      - fetched_items
    output:
      - item_cache
    structured_output: true
    transition: UpdateItemLinkContent
  - id: UpdateItemLinkContent
    type: code
    code:
      type: fixed
      value: |-
        import re
        import json
        
        hierarchy_data = alita_state.get('hierarchy_data', {})
        item_cache = alita_state.get('item_cache', {})
        
        # Extract nested if needed
        if isinstance(hierarchy_data, dict) and 'hierarchy_data' in hierarchy_data:
            hierarchy_data = hierarchy_data['hierarchy_data']
        if isinstance(item_cache, dict) and 'item_cache' in item_cache:
            item_cache = item_cache['item_cache']
        
        # Ensure item_cache is a valid dict
        if not isinstance(item_cache, dict):
            item_cache = {}
        
        # CRITICAL FIX: Normalize cache keys to integers
        # JSON serialization converts int keys to strings, so we need to convert them back
        normalized_cache = {}
        for key, value in item_cache.items():
            try:
                # Convert string keys back to integers
                int_key = int(key)
                normalized_cache[int_key] = value
            except (ValueError, TypeError):
                # If conversion fails, skip this entry
                pass
        item_cache = normalized_cache
        
        feature = hierarchy_data.get('feature', {})
        dependencies = hierarchy_data.get('dependencies', {})
        
        # Update feature links
        if 'links' in feature:
            for link in feature['links']:
                if link.get('type') == 'item':
                    url = link.get('url', '')
                    # Extract ID from URL - handle trailing slashes
                    match = re.search(r'workitem=(\d+)', url, re.IGNORECASE)
                    if not match:
                        match = re.search(r'/_workitems/edit/(\d+)', url, re.IGNORECASE)
                    
                    if match:
                        item_id = int(match.group(1))
                        if item_id in item_cache:
                            # Populate content with item data (compact JSON)
                            link['content'] = json.dumps(item_cache[item_id], separators=(',', ':'))
        
        # Update dependency links
        for dep_id, dep in dependencies.items():
            if 'links' in dep:
                for link in dep['links']:
                    if link.get('type') == 'item':
                        url = link.get('url', '')
                        match = re.search(r'workitem=(\d+)', url, re.IGNORECASE)
                        if not match:
                            match = re.search(r'/_workitems/edit/(\d+)', url, re.IGNORECASE)
                        
                        if match:
                            item_id = int(match.group(1))
                            if item_id in item_cache:
                                # Populate content with item data (compact JSON)
                                link['content'] = json.dumps(item_cache[item_id], separators=(',', ':'))
        
        {
            'hierarchy_data': hierarchy_data
        }
    input:
      - hierarchy_data
      - item_cache
    output:
      - hierarchy_data
    structured_output: true
    transition: CalculateReadiness
  - id: CalculateReadiness
    type: code
    code:
      type: fixed
      value: |-
        hierarchy_data = alita_state.get('hierarchy_data', {})

        # Extract nested if needed
        if isinstance(hierarchy_data, dict) and 'hierarchy_data' in hierarchy_data:
            hierarchy_data = hierarchy_data['hierarchy_data']

        feature = hierarchy_data.get('feature', {})
        dependencies = hierarchy_data.get('dependencies', {})

        # Define completed states (case-insensitive)
        completed_states = {'done', 'closed', 'completed', 'resolved'}

        # Count total and completed items (including feature)
        total_items = len(dependencies) + 1  # +1 for feature itself
        completed_items = 0

        # Check if feature is completed
        feature_state = feature.get('state', '').lower()
        feature_is_done = feature_state in completed_states
        if feature_is_done:
            completed_items += 1

        # Collect blockers (non-completed dependencies)
        blockers = []

        # Break down by type
        by_type = {}

        for item_id, item in dependencies.items():
            state = item.get('state', '').lower()
            work_type = item.get('type', 'Unknown')
            # Count by type
            if work_type not in by_type:
                by_type[work_type] = {'total': 0, 'completed': 0}
            by_type[work_type]['total'] += 1
            # Check if completed
            if state in completed_states:
                completed_items += 1
                by_type[work_type]['completed'] += 1
            else:
                # Add to blockers
                blockers.append({
                    'id': item.get('id'),
                    'title': item.get('title', 'Untitled'),
                    'type': work_type,
                    'state': item.get('state', 'Unknown'),
                    'assigned_to': item.get('assigned_to', 'N/A'),
                    'url': item.get('url', '')
                })

        # Calculate completion percentage
        completion_percentage = (completed_items / total_items * 100) if total_items > 0 else 0

        # Determine readiness status based on rules
        if completion_percentage >= 95 and feature_is_done:
            readiness_status = 'COMPLETE'
            status_reason = 'completion ≥ 95% and feature completed'
        elif completion_percentage >= 90:
            readiness_status = 'READY'
            status_reason = 'completion ≥ 90%'
        elif completion_percentage >= 50:
            readiness_status = 'IN_PROGRESS'
            status_reason = '50% ≤ completion < 90%'
        else:
            readiness_status = 'AT_RISK'
            status_reason = 'completion < 50%'

        # Generate breakdown by type
        type_breakdown = []
        for work_type, counts in by_type.items():
            type_pct = (counts['completed'] / counts['total'] * 100) if counts['total'] > 0 else 0
            type_breakdown.append({
                'type': work_type,
                'total': counts['total'],
                'completed': counts['completed'],
                'percentage': round(type_pct, 1)
            })

        # Build formatted markdown report
        report_lines = []
        report_lines.append(f"# Readiness report for Feature {feature.get('id')}:\n")
        report_lines.append("## Feature summary")
        report_lines.append(f"Feature ID: {feature.get('id')}")
        report_lines.append(f"Title: {feature.get('title')}")
        report_lines.append(f"State: {feature.get('state')}")
        report_lines.append(f"URL: {feature.get('url')}\n")

        report_lines.append("## Readiness status")
        report_lines.append(f"Total work items (including feature): {total_items}")
        report_lines.append(f"Completed items: {completed_items}")
        report_lines.append(f"Completion: {round(completion_percentage, 1)}% ({completed_items} / {total_items})")
        report_lines.append(f"Overall status: {readiness_status} ({status_reason})\n")

        # Add blockers section
        if blockers:
            report_lines.append(f"## Blockers (non-completed dependencies — {len(blockers)} item(s))")
            for blocker in blockers:
                report_lines.append(f"ID {blocker['id']} — {blocker['type']}: {blocker['title']}")
                report_lines.append(f"State: {blocker['state']}")
                report_lines.append(f"Assigned to: {blocker['assigned_to']}")
                report_lines.append(f"URL: {blocker['url']}")
        else:
            report_lines.append("## Blockers")
            report_lines.append("No blockers — all dependencies completed!")

        formatted_report = "\n".join(report_lines)

        # Build structured readiness report
        readiness_report = {
            'readiness_status': readiness_status,
            'status_reason': status_reason,
            'feature_id': feature.get('id'),
            'feature_title': feature.get('title'),
            'feature_state': feature.get('state'),
            'summary': {
                'total_items': total_items,
                'completed_items': completed_items,
                'pending_items': total_items - completed_items,
                'completion_percentage': round(completion_percentage, 1)
            },
            'breakdown_by_type': type_breakdown,
            'blockers': blockers,
            'max_hierarchy_level': hierarchy_data.get('metadata', {}).get('max_level', 0),
            'formatted_report': formatted_report
        }

        # Add report to hierarchy data
        hierarchy_data['readiness'] = readiness_report

        {
            'hierarchy_data': hierarchy_data,
            'readiness_report': readiness_report
        }
    input:
      - hierarchy_data
    output:
      - hierarchy_data
      - readiness_report
    structured_output: true
    transition: BuildHierarchyMarkdown
  - id: BuildHierarchyMarkdown
    type: code
    code:
      type: fixed
      value: |-
        hierarchy_data = alita_state.get('hierarchy_data', {})

        # Extract nested if needed
        if isinstance(hierarchy_data, dict) and 'hierarchy_data' in hierarchy_data:
            hierarchy_data = hierarchy_data['hierarchy_data']

        feature = hierarchy_data.get('feature', {})
        dependencies = hierarchy_data.get('dependencies', {})

        # Define status icons based on state
        def get_status_icon(state):
            state_lower = state.lower()
            if state_lower in {'done', 'closed', 'completed', 'resolved'}:
                return '✅'
            elif state_lower in {'in progress', 'active', 'doing'}:
                return '⚠️'
            else:
                return '❌'

        # Build tree structure recursively
        def build_tree(item_id, prefix='', is_last=True):
            lines = []
            # Get item data
            if item_id == feature.get('id'):
                item = feature
                is_feature = True
            else:
                item = dependencies.get(str(item_id), {})
                is_feature = False
            # Format current item
            title = item.get('title', 'Untitled')
            state = item.get('state', 'Unknown')
            item_type = item.get('type', 'Item')
            status_icon = get_status_icon(state)
            if is_feature:
                lines.append(f"{item_type}: {title}")
            else:
                connector = '└── ' if is_last else '├── '
                lines.append(f"{prefix}{connector}{item_type}: {title} (ID {item_id}) {status_icon} {state}")
            # Get children
            children_ids = item.get('children_ids', [])
            if children_ids:
                for idx, child_id in enumerate(children_ids):
                    is_last_child = (idx == len(children_ids) - 1)
                    if is_feature:
                        child_prefix = ''
                    else:
                        extension = '    ' if is_last else '│   '
                        child_prefix = prefix + extension
                    lines.extend(build_tree(child_id, child_prefix, is_last_child))
            return lines

        # Build the hierarchy markdown
        md_lines = []
        md_lines.append("# Work item hierarchy\n")
        md_lines.extend(build_tree(feature.get('id')))
        md_lines.append("\n(Status icons: ✅ Done/Closed/Completed — ⚠️ In Progress/Active — ❌ To Do/New/other)")

        hierarchy_markdown = "\n".join(md_lines)

        {
            'hierarchy_markdown': hierarchy_markdown
        }
    input:
      - hierarchy_data
    output:
      - hierarchy_markdown
    structured_output: true
    transition: RouteSaving
  - id: RouteSaving
