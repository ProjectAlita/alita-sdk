state:
  all_fetched_items:
    type: list
    value: []
  all_item_ids:
    type: list
    value: []
  artifact_filepath:
    type: string
    value: ''
  current_parent_ids:
    type: list
    value: []
  current_query:
    type: string
    value: ''
  epic_data:
    type: dict
    value: {}
  epic_id:
    type: int
    value: 0
  error_message:
    type: string
    value: ''
  max_depth:
    type: int
    value: 100
  current_depth:
    type: int
    value: 0
  include_links:
    type: bool
    value: true
  fetch_query:
    type: string
    value: ''
  fetched_items:
    type: list
    value: []
  has_more_epics:
    type: bool
    value: false
  has_more_levels:
    type: bool
    value: false
  hierarchy_data:
    type: dict
    value: {}
  hierarchy_markdown:
    type: string
    value: ''
  input:
    type: string
  item_cache:
    type: dict
    value: {}
  level_items:
    type: list
    value: []
  md_filepath:
    type: string
    value: ''
  missing_ids:
    type: list
    value: []
  operation_result:
    type: string
    value: ''
  output_name:
    type: string
    value: ''
  readiness_report:
    type: dict
    value: {}
  result_filename:
    type: string
    value: ''
  validation_passed:
    type: bool
    value: false
entry_point: ParseInput
nodes:
  - id: ParseInput
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re

        input_str = alita_state.get('input', '').strip()

        # Step 1: Check if input is provided
        if not input_str:
            result = {
                "validation_passed": False,
                "error_message": "Input is required. Please provide JSON: {\"id\": 9, \"include_dependencies\": true, \"include_links\": true}",
                "epic_id": 0,
                "max_depth": 100,
                "include_links": True,
                "output_name": ""
            }
        else:
            # Step 2: Try to parse JSON
            parse_failed = False
            try:
                input_data = json.loads(input_str)
            except json.JSONDecodeError:
                # Try to fix Python-style booleans (True/False) to JSON-style (true/false)
                fixed_input = re.sub(r':\s*True\b', ': true', input_str)
                fixed_input = re.sub(r':\s*False\b', ': false', fixed_input)
                try:
                    input_data = json.loads(fixed_input)
                except json.JSONDecodeError:
                    parse_failed = True
                    result = {
                        "validation_passed": False,
                        "error_message": f"Input is not parsable json. Expected format: {{\"id\": 9, \"include_dependencies\": true, \"include_links\": true, \"output_name\": \"optional\"}}\nReceived input: \"{input_str}\"",
                        "epic_id": 0,
                        "max_depth": 100,
                        "include_links": True,
                        "output_name": ""
                    }
            
            if not parse_failed:
                # Step 3: Validate JSON structure and types
                if not isinstance(input_data, dict):
                    result = {
                        "validation_passed": False,
                        "error_message": "Input must be a JSON object. Expected: {\"id\": 9, \"include_dependencies\": true, \"include_links\": true}",
                        "epic_id": 0,
                        "max_depth": 100,
                        "include_links": True,
                        "output_name": ""
                    }
                elif 'id' not in input_data:
                    # Transform include_dependencies to max_depth early for error cases
                    include_deps = input_data.get('include_dependencies', True)
                    if isinstance(include_deps, bool):
                        max_depth = 100 if include_deps else 0
                    elif isinstance(include_deps, int):
                        max_depth = max(0, include_deps)
                    else:
                        max_depth = 100
                    result = {
                        "validation_passed": False,
                        "error_message": "Missing required field 'id'. Expected: {\"id\": 9, \"include_dependencies\": true, \"include_links\": true}",
                        "epic_id": 0,
                        "max_depth": max_depth,
                        "include_links": input_data.get('include_links', True),
                        "output_name": input_data.get('output_name', '')
                    }
                else:
                    # Step 4: Validate include_dependencies, include_links, and output_name types if provided
                    include_deps = input_data.get('include_dependencies', True)
                    include_links = input_data.get('include_links', True)
                    output_name = input_data.get('output_name', '')
                    
                    # Transform include_dependencies to max_depth
                    if isinstance(include_deps, bool):
                        max_depth = 100 if include_deps else 0
                    elif isinstance(include_deps, int):
                        if include_deps < 0:
                            result = {
                                "validation_passed": False,
                                "error_message": "Field 'include_dependencies' must be >= 0 when using int. Use false for 0, true for unlimited, or positive int for specific depth.",
                                "epic_id": 0,
                                "max_depth": 100,
                                "include_links": True,
                                "output_name": ""
                            }
                            max_depth = None  # Mark as invalid
                        else:
                            max_depth = include_deps
                    else:
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'include_dependencies' must be a boolean or integer. Use false for no dependencies, true for all, or int for max depth.",
                            "epic_id": 0,
                            "max_depth": 100,
                            "include_links": True,
                            "output_name": ""
                        }
                        max_depth = None  # Mark as invalid
                    
                    # Validate include_links type
                    if max_depth is not None and 'include_links' in input_data and not isinstance(include_links, bool):
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'include_links' must be a boolean (true or false).",
                            "epic_id": 0,
                            "max_depth": max_depth,
                            "include_links": True,
                            "output_name": ""
                        }
                    elif max_depth is None:
                        pass  # Error already set above
                    elif 'output_name' in input_data and not isinstance(output_name, str):
                        result = {
                            "validation_passed": False,
                            "error_message": "Field 'output_name' must be a string. Expected: {\"id\": 9, \"include_dependencies\": true, \"include_links\": true, \"output_name\": \"my_run\"}",
                            "epic_id": 0,
                            "max_depth": max_depth,
                            "include_links": include_links,
                            "output_name": ""
                        }
                    else:
                        # Step 5: Validate ID value
                        try:
                            epic_id = int(input_data['id'])
                            if epic_id <= 0:
                                result = {
                                    "validation_passed": False,
                                    "error_message": f"Invalid work item ID: {input_data['id']}. ID must be a positive integer.",
                                    "epic_id": 0,
                                    "max_depth": max_depth,
                                    "include_links": include_links,
                                    "output_name": output_name
                                }
                            else:
                                # All validations passed
                                # Generate output_name if not provided: {id}_feature
                                # If provided by user: {id}_feature_{output_name}
                                if not output_name or not output_name.strip():
                                    output_name = f"{epic_id}_feature"
                                else:
                                    output_name = f"{epic_id}_feature_{output_name}"
                                
                                result = {
                                    "validation_passed": True,
                                    "error_message": "",
                                    "epic_id": epic_id,
                                    "max_depth": max_depth,
                                    "include_links": include_links,
                                    "output_name": output_name
                                }
                        except (ValueError, TypeError):
                            result = {
                                "validation_passed": False,
                                "error_message": f"Invalid work item ID: {input_data['id']}. ID must be a positive integer.",
                                "epic_id": 0,
                                "max_depth": max_depth if max_depth is not None else 100,
                                "include_links": include_links,
                                "output_name": output_name
                            }

        result
    input:
      - input
    output:
      - validation_passed
      - error_message
      - epic_id
      - max_depth
      - include_links
      - output_name
    structured_output: true
    transition: ValidationRouter
  - id: ValidationRouter
    type: router
    condition: |
      {% if validation_passed %}
        FetchEpic
      {% else %}
        FormatErrorResult
      {% endif %}
    default_output: FormatErrorResult
    input:
      - validation_passed
    routes:
      - FetchEpic
      - FormatErrorResult
  - id: FetchEpic
    type: toolkit
    input:
      - epic_id
    input_mapping:
      id:
        type: variable
        value: epic_id
      expand:
        type: fixed
        value: All
    on_error:
      transition: HandleFetchError
    output:
      - epic_data
    structured_output: true
    tool: get_work_item
    toolkit_name: LFAADOBoardReader
    transition: ValidateEpicData
  - id: ValidateEpicData
    type: code
    code:
      type: fixed
      value: |-
        epic_data = alita_state.get('epic_data', {})
        epic_id = alita_state.get('epic_id')

        # Check if epic_data is valid
        if not epic_data or not isinstance(epic_data, dict):
            validation_passed = False
            error_message = f"Work item {epic_id} does not exist or could not be retrieved from Azure DevOps. Please verify the item ID and try again."
        elif 'System.Id' not in epic_data and 'id' not in epic_data:
            validation_passed = False
            error_message = f"Invalid response received for work item {epic_id}. The item may not exist or may be inaccessible."
        else:
            validation_passed = True
            error_message = ""

        {
            "validation_passed": validation_passed,
            "error_message": error_message
        }
    input:
      - epic_data
      - epic_id
    output:
      - validation_passed
      - error_message
    structured_output: true
    transition: EpicValidationRouter
  - id: EpicValidationRouter
    type: router
    condition: |
      {% if validation_passed %}
        InitializeFetch
      {% else %}
        FormatErrorResult
      {% endif %}
    default_output: FormatErrorResult
    input:
      - validation_passed
    routes:
      - InitializeFetch
      - FormatErrorResult
  - id: HandleFetchError
    type: code
    code:
      type: fixed
      value: |-
        epic_id = alita_state.get('epic_id')

        {
            "validation_passed": False,
            "error_message": f"Failed to fetch work item {epic_id} from Azure DevOps. The item may not exist, or you may not have permission to access it. Please verify the item ID and your access permissions."
        }
    input:
      - epic_id
    output:
      - validation_passed
      - error_message
    structured_output: true
    transition: FormatErrorResult
  - id: FormatErrorResult
    type: state_modifier
    input:
      - error_message
      - epic_id
    output:
      - operation_result
    template: '{"operation": "fetch_hierarchy", "status": "error", "item_id": {{ epic_id }}, "error": "{{ error_message | replace(''"'', ''\\"'') }}"}'
    transition: OutputResult
    variables_to_clean: []
  - id: OutputResult
    type: code
    code:
      type: fixed
      value: |-
        # Return operation_result as the final response
        operation_result = alita_state.get('operation_result', '')
        operation_result
    input:
      - operation_result
    output: []
    structured_output: false
    transition: END
  - id: InitializeFetch
    type: code
    code:
      type: fixed
      value: |-
        epic_id = alita_state.get('epic_id')
        max_depth = alita_state.get('max_depth', 100)

        # Only build query for children if max_depth > 0
        # max_depth = 0 means feature only, no dependencies
        if max_depth > 0:
            # Build WIQL query for direct children (including description field)
            current_query = f"SELECT [System.Id], [System.Title], [System.State], [System.WorkItemType], [System.Parent], [System.Description] FROM WorkItems WHERE [System.Parent] = {epic_id}"
        else:
            # Skip dependency fetching - feature only
            current_query = ""

        result = {
            "current_query": current_query,
            "all_item_ids": [],
            "all_fetched_items": [],
            "current_parent_ids": [epic_id] if max_depth > 0 else [],  # Track which parent IDs we're querying for
            "current_depth": 0,  # Start at depth 0 (feature level)
            "artifact_filepath": ""  # Clear filepath for new feature - will be auto-generated
        }
        result
    input:
      - epic_id
      - max_depth
    output:
      - current_query
      - all_item_ids
      - all_fetched_items
      - current_parent_ids
      - current_depth
      - artifact_filepath
    structured_output: true
    transition: CheckShouldFetch
  - id: CheckShouldFetch
    type: router
    condition: |
      {% if current_query %}
        FetchLevel
      {% else %}
        CleanHierarchyData
      {% endif %}
    default_output: CleanHierarchyData
    input:
      - current_query
    routes:
      - FetchLevel
      - CleanHierarchyData
  - id: FetchLevel
    type: toolkit
    input:
      - current_query
      - current_parent_ids
      - max_depth
      - current_depth
    input_mapping:
      fields:
        type: fixed
        value:
          - System.Id
          - System.Title
          - System.State
          - System.WorkItemType
          - System.Parent
          - System.Description
          - System.AssignedTo
          - System.Reason
          - System.CreatedDate
          - System.ChangedDate
      limit:
        type: fixed
        value: 1000
      query:
        type: variable
        value: current_query
    on_error:
      transition: CleanHierarchyData
    output:
      - level_items
    structured_output: true
    tool: search_work_items
    toolkit_name: LFAADOBoardReader
    transition: ProcessLevel
  - id: ProcessLevel
    type: code
    code:
      type: fixed
      value: |-
        level_items = alita_state.get('level_items', [])
        all_item_ids = alita_state.get('all_item_ids', [])
        all_fetched_items = alita_state.get('all_fetched_items', [])
        current_parent_ids = alita_state.get('current_parent_ids', [])

        # Extract nested values if they're result dicts
        if isinstance(all_item_ids, dict) and 'all_item_ids' in all_item_ids:
            all_item_ids = all_item_ids['all_item_ids']
        if isinstance(all_fetched_items, dict) and 'all_fetched_items' in all_fetched_items:
            all_fetched_items = all_fetched_items['all_fetched_items']
        if isinstance(level_items, dict) and 'level_items' in level_items:
            level_items = level_items['level_items']
        if isinstance(current_parent_ids, dict) and 'current_parent_ids' in current_parent_ids:
            current_parent_ids = current_parent_ids['current_parent_ids']

        # Handle string response (no items found) or None
        if not isinstance(level_items, list):
            level_items = []

        # Collect IDs from this level and assign parent relationships
        child_ids = []
        for item in level_items:
            item_id = item.get('id') or item.get('System.Id')
            if item_id and item_id not in all_item_ids:
                # Try to get System.Parent from response, but ADO often doesn't return it
                explicit_parent = item.get('System.Parent')
                # If System.Parent is not in response, infer from query
                # When we query "WHERE [System.Parent] IN (10,18)", we know parent is one of [10,18]
                # For single parent queries initially, use the first parent_id
                if not explicit_parent and current_parent_ids:
                    # Store which parent query fetched this item
                    # If multiple parents, we can't determine exact parent without the field
                    # But for most cases, items fetched in one batch share same parent level
                    item['_inferred_parent_from_query'] = current_parent_ids
                child_ids.append(item_id)
                all_item_ids.append(item_id)
                all_fetched_items.append(item)

        # Get max_depth and current_depth from state
        max_depth = alita_state.get('max_depth', 100)
        current_depth = alita_state.get('current_depth', 0)
        
        # Increment depth for next level
        next_depth = current_depth + 1
        
        # Build query for next level (children of current level), including description field
        # Check if we should fetch more based on depth limit
        # next_depth represents the iteration counter, items fetched will be at depth next_depth+1
        # So if max_depth=1, we want to fetch items at depth 1 only, which means next_depth must be < 1
        if child_ids and next_depth < max_depth:
            ids_str = ','.join(map(str, child_ids))
            next_query = f"SELECT [System.Id], [System.Title], [System.State], [System.WorkItemType], [System.Parent], [System.Description] FROM WorkItems WHERE [System.Parent] IN ({ids_str})"
            next_parent_ids = child_ids  # Next level will be children of these IDs
            has_more = True
        else:
            next_query = ""
            next_parent_ids = []
            has_more = False

        result = {
            "current_query": next_query,
            "all_item_ids": all_item_ids,
            "all_fetched_items": all_fetched_items,
            "has_more_levels": has_more,
            "current_parent_ids": next_parent_ids,
            "current_depth": next_depth
        }
        result
    input:
      - level_items
      - all_item_ids
      - all_fetched_items
      - current_parent_ids
      - max_depth
      - current_depth
    output:
      - current_query
      - all_item_ids
      - all_fetched_items
      - has_more_levels
      - current_parent_ids
      - current_depth
    structured_output: true
    transition: CheckMoreRouter
  - id: CheckMoreRouter
    type: router
    condition: |
      {% if has_more_levels %}
        FetchLevel
      {% else %}
        CleanHierarchyData
      {% endif %}
    default_output: CleanHierarchyData
    input:
      - has_more_levels
    routes:
      - FetchLevel
      - CleanHierarchyData
  - id: CleanHierarchyData
    type: code
    code:
      type: fixed
      value: |-
        import json
        import re
        import html as _html

        epic_data = alita_state.get('epic_data', {})
        epic_id = alita_state.get('epic_id')
        all_fetched_items = alita_state.get('all_fetched_items', [])

        # Extract nested if needed
        if isinstance(all_fetched_items, dict) and 'all_fetched_items' in all_fetched_items:
            all_fetched_items = all_fetched_items['all_fetched_items']

        def remove_links_recursively(obj):
            """Recursively remove _links fields from nested objects."""
            if isinstance(obj, dict):
                # Remove _links from current level
                if '_links' in obj:
                    del obj['_links']
                # Recurse into nested dicts
                for key, value in obj.items():
                    if isinstance(value, dict):
                        remove_links_recursively(value)
                    elif isinstance(value, list):
                        for item in value:
                            if isinstance(item, dict):
                                remove_links_recursively(item)
            return obj
        
        # Remove _links field from epic_data (ADO internal field)
        if isinstance(epic_data, dict):
            remove_links_recursively(epic_data)
        
        # Remove _links field from all fetched items (ADO internal field)
        for item in all_fetched_items:
            if isinstance(item, dict):
                remove_links_recursively(item)

        def strip_html(text):
            """Strip HTML tags and normalise whitespace from a description field."""
            if not text:
                return ''
            text = _html.unescape(text)          # &amp; → &, &nbsp; → \xa0, etc.
            text = re.sub(r'<[^>]+>', ' ', text) # remove every HTML tag
            text = text.replace('\xa0', ' ')     # convert non-breaking spaces to regular spaces
            text = re.sub(r'[ \t]+', ' ', text)  # collapse horizontal whitespace
            text = re.sub(r'\n{3,}', '\n\n', text)  # collapse excess blank lines
            return text.strip()

        def extract_urls(text, should_extract):
            """Extract and categorize URLs from text (including from HTML before stripping)."""
            if not text or not should_extract:
                return []
            
            urls = []
            
            # First extract URLs from HTML href attributes before stripping HTML
            html_links = re.findall(r'<a\s+(?:[^>]*?\s+)?href=["\']([^"\']+)["\']', text, re.IGNORECASE)
            urls.extend(html_links)
            
            # Then extract plain text URLs (http, https, ftp)
            # Pattern matches: http://..., https://..., ftp://...
            url_pattern = r'https?://[^\s<>"{}|\\^`\[\]]+|ftp://[^\s<>"{}|\\^`\[\]]+'
            text_urls = re.findall(url_pattern, text)
            urls.extend(text_urls)
            
            # Remove duplicates while preserving order
            seen = set()
            unique_urls = []
            for url in urls:
                if url not in seen:
                    seen.add(url)
                    unique_urls.append(url)
            
            # Categorize URLs and create link objects
            links = []
            for url in unique_urls:
                # Determine link type
                if 'figma.com' in url:
                    link_type = 'figma'
                elif '/_wiki/' in url:
                    link_type = 'wiki'
                elif 'workitem=' in url or '/_workitems/' in url:
                    link_type = 'item'
                else:
                    link_type = 'other'
                
                links.append({
                    'url': url,
                    'type': link_type,
                    'content': ''
                })
            
            return links

        # Get include_links setting from state
        include_links = alita_state.get('include_links', True)
        
        # Initialize hierarchy with the feature (top-level item with description and links)
        feature_description = epic_data.get('System.Description', '')
        feature_links = extract_urls(feature_description, include_links)
        
        # Build feature structure, excluding empty links list
        feature_dict = {
            'id': epic_id,
            'title': epic_data.get('System.Title', 'Untitled'),
            'state': epic_data.get('System.State', 'Unknown'),
            'type': epic_data.get('System.WorkItemType', 'Epic'),
            'url': epic_data.get('url', ''),
            'description': strip_html(feature_description),
            'parent_id': None,
            'children_ids': [],
            'level': 0
        }
        # Only add links if not empty
        if feature_links:
            feature_dict['links'] = feature_links
        
        hierarchy = {
            'feature': feature_dict,
            'dependencies': {},
            'metadata': {
                'total_items': 0,
                'max_level': 0
            }
        }

        # Build items dictionary with clean data
        # Create a parent mapping from query inference
        parent_map = {}  # Maps child_id to parent_id based on query results

        for item in all_fetched_items:
            item_id = item.get('id') or item.get('System.Id')
            parent_id = item.get('System.Parent')
            # If System.Parent exists in response, use it
            if parent_id:
                parent_map[item_id] = parent_id
            # Otherwise check if we inferred it from query
            elif '_inferred_parent_from_query' in item:
                inferred_parents = item['_inferred_parent_from_query']
                # For now, when multiple parents possible, try to deduce from available data
                # The challenge: we queried "WHERE [System.Parent] IN (10,18)" but don't know which
                # Workaround: Assign parent sequentially (this is best-effort without System.Parent field)
                if len(inferred_parents) == 1:
                    parent_map[item_id] = inferred_parents[0]
                # If multiple parents, we need System.Parent field - fallback to first parent and mark for debug
                else:
                    parent_map[item_id] = inferred_parents[0]
                    item['_parent_ambiguous'] = True
            else:
                # No parent info at all, assume direct child of feature
                parent_map[item_id] = epic_id

        for item in all_fetched_items:
            item_id = item.get('id') or item.get('System.Id')
            # Convert to string for dict key
            item_id_str = str(item_id)
            # Use mapped parent or default to epic
            parent_id = parent_map.get(item_id, epic_id)
            
            # Extract description and links
            item_description = item.get('System.Description', '')
            item_links = extract_urls(item_description, include_links)
            
            # Store complete item data (all fields for readiness analysis, including description and links)
            clean_item = {
                'id': item_id,
                'title': item.get('System.Title', 'Untitled'),
                'state': item.get('System.State', 'Unknown'),
                'type': item.get('System.WorkItemType', 'Task'),
                'parent_id': parent_id,
                'children_ids': [],
                'level': 0,  # Will be calculated
                'description': strip_html(item_description),
                # Additional fields from search results
                'assigned_to': item.get('System.AssignedTo', 'N/A'),
                'reason': item.get('System.Reason', ''),
                'created_date': item.get('System.CreatedDate', ''),
                'changed_date': item.get('System.ChangedDate', ''),
                'work_item_type': item.get('System.WorkItemType', ''),
                'url': item.get('url', '')
            }
            # Only add links if not empty
            if item_links:
                clean_item['links'] = item_links
            
            hierarchy['dependencies'][item_id_str] = clean_item

        # Calculate levels and populate children_ids
        # First pass: add all dependencies to their parent's children list
        for item_id, item in hierarchy['dependencies'].items():
            parent_id = item['parent_id']
            parent_id_str = str(parent_id)
            if parent_id == epic_id:
                # Direct child of feature
                if item['id'] not in hierarchy['feature']['children_ids']:
                    hierarchy['feature']['children_ids'].append(item['id'])
                item['level'] = 1
            elif parent_id_str in hierarchy['dependencies']:
                # Child of another dependency (convert parent_id to string for lookup)
                parent_item = hierarchy['dependencies'][parent_id_str]
                if item['id'] not in parent_item['children_ids']:
                    parent_item['children_ids'].append(item['id'])

        # Second pass: calculate levels for nested dependencies
        max_iterations = 10  # Prevent infinite loops
        for iteration in range(max_iterations):
            updated = False
            for item_id, item in hierarchy['dependencies'].items():
                if item['level'] == 0:  # Not calculated yet
                    parent_id_str = str(item['parent_id'])
                    if parent_id_str in hierarchy['dependencies'] and hierarchy['dependencies'][parent_id_str]['level'] > 0:
                        parent_level = hierarchy['dependencies'][parent_id_str]['level']
                        item['level'] = parent_level + 1
                        updated = True
            if not updated:
                break

        # Calculate metadata
        hierarchy['metadata']['total_items'] = len(hierarchy['dependencies'])
        max_level = max([item['level'] for item in hierarchy['dependencies'].values()], default=0)
        hierarchy['metadata']['max_level'] = max_level

        result = {"hierarchy_data": hierarchy}
        result
    input:
      - epic_data
      - epic_id
      - all_fetched_items
      - include_links
    output:
      - hierarchy_data
    structured_output: false
    transition: CheckShouldEnrichLinks
  - id: CheckShouldEnrichLinks
    type: router
    condition: |
      {% if include_links %}
        EnrichItemLinks
      {% else %}
        CalculateReadiness
      {% endif %}
    default_output: CalculateReadiness
    input:
