# Configuration file for testing YAML content loading
# AlitaTextLoader should load this as raw text, preserving YAML structure

application:
  name: TestApp
  version: 1.0.0
  environment: development

database:
  host: localhost
  port: 5432
  name: testdb
  credentials:
    username: admin
    password: ${DB_PASSWORD}

features:
  - feature_flags
  - logging
  - monitoring
  - authentication

settings:
  max_connections: 100
  timeout: 30
  retry_attempts: 3
  cache:
    enabled: true
    ttl: 3600
    size: 1024

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - type: console
      level: DEBUG
    - type: file
      level: INFO
      filename: app.log
      max_bytes: 10485760
      backup_count: 5

# Nested structure test
services:
  web:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ENV=production
      - DEBUG=false
  
  api:
    image: python:3.9
    command: ["python", "app.py"]
    volumes:
      - ./code:/app
      - ./logs:/logs
    depends_on:
      - database
      - cache

# Unicode and special characters in YAML
metadata:
  description: "Test file with émojis 🚀 and spëcial çharacters"
  tags: [testing, yaml, unicode, 数据, テスト]
  notes: |
    Multi-line string with various content:
    - Line 1: Normal text
    - Line 2: Special chars: © ® ™ € £
    - Line 3: Math symbols: ∀ ∃ ∈ ≈ ≠
