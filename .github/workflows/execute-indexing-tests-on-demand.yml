name: Execute Indexing Tests on Demand
run-name: "Loader Tests on Demand: ${{ inputs.test_suites == 'custom' && inputs.custom_suites || inputs.test_suites }}"

on:
  workflow_dispatch:
    inputs:
      test_suites:
        description: 'Loader tests to execute (all will execute all loaders, custom allows specifying comma-separated list, or choose specific loader)'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - custom
          - AlitaCSVLoader
          - AlitaJSONLoader
          - AlitaMarkdownLoader
          - AlitaTextLoader
      custom_suites:
        description: 'Comma-separated loader names (used only when test_suites is "custom")'
        required: false
        type: string
        default: ''
      exclude_suites:
        description: 'Comma-separated loader names to exclude from execution (applies to "all" mode)'
        required: false
        type: string
        default: 'AlitaPDFLoader,AlitaExcelLoader,AlitaDocxMammothLoader,AlitaImageLoader'

jobs:
  configure-matrix:
    runs-on: ubuntu-latest
    outputs:
      loader_matrix: ${{ steps.set-matrix.outputs.loader_matrix }}
      has-tests: ${{ steps.set-matrix.outputs.has-tests }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .alita/tests/test_loaders/
          sparse-checkout-cone-mode: false
      
      - name: Generate loader test matrix
        id: set-matrix
        shell: bash
        run: |
          # Determine which loaders to test
          if [[ "${{ inputs.test_suites }}" == "all" ]]; then
            # Find all loader directories
            loaders=$(find .alita/tests/test_loaders -maxdepth 1 -type d -name "Alita*Loader" -exec basename {} \; | sort)
          elif [[ "${{ inputs.test_suites }}" == "custom" ]]; then
            # Use custom comma-separated list
            loaders=$(echo "${{ inputs.custom_suites }}" | tr ',' '\n')
          else
            # Single loader specified
            loaders="${{ inputs.test_suites }}"
          fi
          
          # Apply exclusions if specified
          if [[ -n "${{ inputs.exclude_suites }}" && "${{ inputs.test_suites }}" != "custom" ]]; then
            exclude_list="${{ inputs.exclude_suites }}"
            for exclude in ${exclude_list//,/ }; do
              loaders=$(echo "$loaders" | grep -v "^${exclude}$" || true)
            done
          fi
          
          # Build JSON matrix with individual test cases
          matrix_json="["
          first=true
          for loader in $loaders; do
            # Check if loader directory exists
            if [[ -d ".alita/tests/test_loaders/$loader" ]]; then
              # Find all input JSON files for this loader
              input_dir=".alita/tests/test_loaders/$loader/input"
              if [[ -d "$input_dir" ]]; then
                for input_file in "$input_dir"/*.json; do
                  if [[ -f "$input_file" ]]; then
                    test_name=$(basename "$input_file" .json)
                    if [[ "$first" == "false" ]]; then
                      matrix_json+=","
                    fi
                    matrix_json+="{\"loader\":\"$loader\",\"test\":\"$test_name\"}"
                    first=false
                  fi
                done
              fi
            fi
          done
          matrix_json+="]"
          
          # Check if we have any tests
          if [[ "$matrix_json" == "[]" ]]; then
            echo "has-tests=false" >> $GITHUB_OUTPUT
            echo "loader_matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "has-tests=true" >> $GITHUB_OUTPUT
            echo "loader_matrix=$matrix_json" >> $GITHUB_OUTPUT
          fi
          
          echo "Generated matrix: $matrix_json"

  test-execution:
    needs: configure-matrix
    if: needs.configure-matrix.outputs.has-tests == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        data: ${{ fromJson(needs.configure-matrix.outputs.loader_matrix) }}
    
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pull Docker image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull ${{ env.REGISTRY }}/$IMAGE_NAME:pyodide
      
      - name: Run loader tests in Docker
        id: run-tests
        run: |
          echo "::group::Running test ${{ matrix.data.loader }}/${{ matrix.data.test }}"
          
          # Run test directly with docker-compose run (shows output)
          docker-compose run --rm alita-sdk \
            python .alita/tests/test_loaders/run_tests.py run ${{ matrix.data.loader }} ${{ matrix.data.test }}
          
          EXIT_CODE=$?
          
          echo "::endgroup::"
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Test failed: ${{ matrix.data.loader }}/${{ matrix.data.test }}"
            exit $EXIT_CODE
          fi
          
          echo "✅ Test passed: ${{ matrix.data.loader }}/${{ matrix.data.test }}"
      
      - name: Copy test results from container
        if: always()
        run: |
          # Start a temporary container to copy results
          docker-compose up -d
          sleep 5
          docker cp alita-sdk-dev:/app/.alita/tests/test_loaders/test_results/ ./test_results/ || mkdir -p ./test_results
          docker-compose down --remove-orphans
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.data.loader }}-${{ matrix.data.test }}
          path: ./test_results/
          retention-days: 30
      
      - name: Clean up workspace
        if: always()
        run: |
          sudo rm -rf $GITHUB_WORKSPACE/{,.[!.],..?}*

  summary:
    needs: [configure-matrix, test-execution]
    if: always() && needs.configure-matrix.outputs.has-tests == 'true'
    runs-on: ubuntu-latest
    steps:-${{ matrix.data.test }}-${{ matrix.data.test }}
      - name: Generate test summary
        run: |
          echo "# Loader Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Suites**: ${{ inputs.test_suites }}" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Mode**: Parallel (max 10 concurrent)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.test-execution.result }}" == "success" ]]; then
            echo "✅ All loader tests passed successfully" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.test-execution.result }}" == "failure" ]]; then
            echo "❌ Some loader tests failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Test execution status: ${{ needs.test-execution.result }}" >> $GITHUB_STEP_SUMMARY
          fi
