name: BaseIndexerToolkit Search Tests
run-name: "IndexerToolkit Search Tests"

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Pytest filter expression (-k), e.g. "filter_by_status" or "filter_multiple"'
        required: false
        type: string
        default: ''
      pytest_mark:
        description: 'Pytest marker (-m), e.g. "search_test"'
        required: false
        type: string
        default: 'search_test'
      extra_pytest_args:
        description: 'Additional pytest args, e.g. "-v -s"'
        required: false
        type: string
        default: '-v'
  
  pull_request:
    paths:
      - 'alita_sdk/tools/base_indexer_toolkit.py'
      - 'tests/tools/test_base_indexer_toolkit.py'
      - 'tests/tools/fixtures/pgvector/**'
  
  push:
    branches:
      - main
      - develop
    paths:
      - 'alita_sdk/tools/base_indexer_toolkit.py'
      - 'tests/tools/test_base_indexer_toolkit.py'
      - 'tests/tools/fixtures/pgvector/**'

jobs:
  search-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    
    services:
      pgvector-test:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: yourpassword
          POSTGRES_DB: postgres
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      PGVECTOR_TEST_CONNECTION_STRING: "postgresql+psycopg://postgres:yourpassword@localhost:5435/postgres"
      DEPLOYMENT_URL: ${{ secrets.DEPLOYMENT_URL_STAGE }}
      ALITA_API_KEY: ${{ secrets.ALITA_API_KEY_STAGE }}
      PROJECT_ID: ${{ secrets.PROJECT_ID_STAGE }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-html psycopg2-binary
      
      - name: Verify pgvector service is ready
        run: |
          echo "Waiting for pgvector to be fully ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5435 -U postgres; then
              echo "✅ pgvector is ready!"
              break
            fi
            echo "⏳ Waiting... ($i/30)"
            sleep 2
          done
          
          # Test connection with psql
          PGPASSWORD=yourpassword psql -h localhost -p 5435 -U postgres -d postgres -c "SELECT version();"
      
      - name: Install PostgreSQL client (if needed)
        run: |
          if ! command -v psql &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
      
      - name: Load test data into pgvector
        run: |
          echo "Loading test data from SQL dump..."
          PGPASSWORD=yourpassword psql -h localhost -p 5435 -U postgres -d postgres \
            -f tests/tools/fixtures/pgvector/init_db.sql
          
          echo "Verifying test data..."
          PGPASSWORD=yourpassword psql -h localhost -p 5435 -U postgres -d postgres \
            -c "SELECT name, (SELECT COUNT(*) FROM langchain_pg_embedding WHERE collection_id = langchain_pg_collection.uuid) as count FROM langchain_pg_collection;"
      
      - name: Run BaseIndexerToolkit search tests
        id: run-tests
        run: |
          mkdir -p tests/reports
          
          # Build pytest command
          cmd=(pytest tests/tools/test_base_indexer_toolkit.py)
          
          # Add marker filter if specified
          if [ -n "${{ inputs.pytest_mark }}" ]; then
            cmd+=(-m "${{ inputs.pytest_mark }}")
          fi
          
          # Add keyword filter if specified
          if [ -n "${{ inputs.test_filter }}" ]; then
            cmd+=(-k "${{ inputs.test_filter }}")
          fi
          
          # Add extra args
          extra_args="${{ inputs.extra_pytest_args }}"
          if [ -n "$extra_args" ]; then
            # shellcheck disable=SC2206
            cmd+=($extra_args)
          fi
          
          # Add reporting
          cmd+=(--junit-xml=tests/reports/junit.xml)
          cmd+=(--html=tests/reports/report.html --self-contained-html)
          
          echo "Running: ${cmd[*]}"
          "${cmd[@]}" || true
      
      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'tests/reports/junit.xml'
          check_name: 'BaseIndexerToolkit Search Test Results'
          detailed_summary: true
          include_passed: true
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/reports/
          retention-days: 30
      
      - name: Database connection summary
        if: always()
        run: |
          echo "## Test Database Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Connection String:** \`postgresql://postgres:***@localhost:5435/postgres\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if PGPASSWORD=yourpassword psql -h localhost -p 5435 -U postgres -d postgres \
            -c "SELECT name, (SELECT COUNT(*) FROM langchain_pg_embedding WHERE collection_id = langchain_pg_collection.uuid) as doc_count FROM langchain_pg_collection;" \
            -t -A -F'|' > /tmp/collections.txt; then
            
            echo "**Collections:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Collection | Documents |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|-----------|" >> $GITHUB_STEP_SUMMARY
            
            while IFS='|' read -r name count; do
              echo "| \`$name\` | $count |" >> $GITHUB_STEP_SUMMARY
            done < /tmp/collections.txt
          fi
      
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testReport = fs.existsSync('tests/reports/junit.xml') 
              ? '✅ Test report generated' 
              : '⚠️ No test report found';
            
            const comment = `
            ## BaseIndexerToolkit Search Tests
            
            ${testReport}
            
            **Workflow:** ${{ github.workflow }}
            **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            <details>
            <summary>Test Configuration</summary>
            
            - **Filter:** \`${{ inputs.test_filter || 'none' }}\`
            - **Marker:** \`${{ inputs.pytest_mark || 'search_test' }}\`
            - **Extra Args:** \`${{ inputs.extra_pytest_args || '-v' }}\`
            - **Connection:** \`postgresql://postgres:***@localhost:5435/postgres\`
            
            </details>
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
